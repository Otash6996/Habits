<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — Habit Tracker</title>
<style>
  :root{
    --bg:#F6F6F4;
    --ink:#2E2C33;
    --ink-soft:#8B8794;
    --card:#FFFFFF;
    --sage:#A8C5AE;
    --sage-deep:#7FAE8A;
    --lilac:#CBC4E6;
    --blush:#F2DCD4;
    --line:#ECEAE6;
    --radius:22px;
    --shadow:0 10px 30px rgba(46,44,51,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 20px 80px;
  }
  .wrap{max-width:760px;margin:0 auto}

  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:34px}
  .brand h1{font-size:30px;font-weight:600;letter-spacing:-.02em}
  .brand p{color:var(--ink-soft);font-size:14px;margin-top:4px;font-weight:400}
  .add-btn{
    border:none;cursor:pointer;font-family:inherit;
    background:var(--ink);color:#fff;font-size:14px;font-weight:500;
    padding:12px 20px;border-radius:999px;
    transition:transform .25s cubic-bezier(.2,.8,.3,1.2), background .2s;
  }
  .add-btn:hover{transform:translateY(-2px);background:#454250}
  .add-btn:active{transform:scale(.96)}
  .add-btn:focus-visible{outline:2px solid var(--sage-deep);outline-offset:3px}

  /* ---------- form panel ---------- */
  .panel{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:28px;margin-bottom:30px;overflow:hidden;
    display:none;
    animation:panelIn .45s cubic-bezier(.2,.8,.25,1) both;
  }
  .panel.open{display:block}
  @keyframes panelIn{from{opacity:0;transform:translateY(-14px) scale(.985)}to{opacity:1;transform:none}}
  .panel h2{font-size:17px;font-weight:600;margin-bottom:20px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .field input[type=text],.field input[type=date]{
    width:100%;border:1.5px solid var(--line);border-radius:14px;background:#FBFBFA;
    padding:13px 15px;font-size:15px;font-family:inherit;color:var(--ink);
    transition:border-color .2s, box-shadow .2s;
  }
  .field input:focus{outline:none;border-color:var(--sage-deep);box-shadow:0 0 0 4px rgba(127,174,138,.13)}
  .dates{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .photo-drop{
    border:1.5px dashed #D8D5CE;border-radius:16px;background:#FBFBFA;
    padding:22px;text-align:center;cursor:pointer;position:relative;
    transition:border-color .2s, background .2s;
  }
  .photo-drop:hover{border-color:var(--sage-deep);background:#F4F8F4}
  .photo-drop span{color:var(--ink-soft);font-size:14px}
  .photo-drop.has-img{padding:0;border-style:solid;border-color:var(--line)}
  .photo-drop img{display:block;width:100%;height:150px;object-fit:cover;border-radius:14px}
  .photo-drop .clear-photo{
    position:absolute;top:10px;right:10px;border:none;cursor:pointer;
    width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);
    font-size:15px;color:var(--ink);line-height:1;
  }
  .panel-actions{display:flex;gap:12px;margin-top:24px}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;
    padding:13px 22px;border-radius:999px;transition:transform .2s, opacity .2s;
  }
  .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--sage-deep);color:#fff;flex:1}
  .btn-primary:hover{opacity:.92}
  .btn-ghost{background:transparent;color:var(--ink-soft)}
  .btn-ghost:hover{color:var(--ink)}
  .form-error{color:#C0696B;font-size:13px;margin-top:14px;display:none}

  /* ---------- habit cards ---------- */
  .habits{display:flex;flex-direction:column;gap:22px}
  .habit{
    position:relative;border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);background:var(--card);
    animation:cardIn .5s cubic-bezier(.2,.8,.25,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .habit-bg{
    position:absolute;inset:0;background-size:cover;background-position:center;
    transition:filter 1s ease;
  }
  .habit-veil{
    position:absolute;inset:0;
    background:linear-gradient(160deg, rgba(255,255,255,.94) 0%, rgba(255,255,255,.86) 55%, rgba(255,255,255,.78) 100%);
    transition:opacity 1s ease;
  }
  .habit-inner{position:relative;padding:26px 26px 24px}
  .habit-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:6px}
  .habit-name{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .habit-range{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .habit-del{
    border:none;background:transparent;cursor:pointer;color:#C9C5BE;font-size:17px;
    padding:4px 8px;border-radius:8px;transition:color .2s, background .2s;
  }
  .habit-del:hover{color:#C0696B;background:rgba(192,105,107,.08)}

  .progress-row{display:flex;align-items:center;gap:12px;margin:14px 0 18px}
  .bar{flex:1;height:6px;border-radius:99px;background:rgba(46,44,51,.08);overflow:hidden}
  .bar-fill{
    height:100%;border-radius:99px;width:0%;
    background:linear-gradient(90deg,var(--sage),var(--sage-deep));
    transition:width .8s cubic-bezier(.2,.8,.25,1);
  }
  .pct{font-size:13px;font-weight:600;color:var(--sage-deep);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}

  .month-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 8px}
  .day-grid{display:flex;flex-wrap:wrap;gap:7px}
  .day{
    width:34px;height:34px;border-radius:11px;border:none;cursor:pointer;
    background:rgba(46,44,51,.06);color:var(--ink-soft);
    font-size:12px;font-weight:500;font-family:inherit;font-variant-numeric:tabular-nums;
    transition:background .25s, color .25s, transform .25s cubic-bezier(.2,.8,.3,1.4);
    position:relative;
  }
  .day:hover{transform:scale(1.12);background:rgba(46,44,51,.1)}
  .day:focus-visible{outline:2px solid var(--sage-deep);outline-offset:2px}
  .day.today{box-shadow:inset 0 0 0 1.5px var(--lilac)}
  .day.done{background:var(--sage-deep);color:#fff}
  .day.done.pop{animation:bloom .45s cubic-bezier(.2,.8,.3,1.4)}
  @keyframes bloom{0%{transform:scale(.6)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
  .day.future{opacity:.38;cursor:default}
  .day.future:hover{transform:none;background:rgba(46,44,51,.06)}

  .empty{
    text-align:center;padding:70px 20px;color:var(--ink-soft);
    animation:cardIn .5s ease both;
  }
  .empty .dot-row{display:flex;justify-content:center;gap:9px;margin-bottom:22px}
  .empty .dot{width:12px;height:12px;border-radius:50%;animation:breathe 2.6s ease-in-out infinite}
  .empty .dot:nth-child(1){background:var(--sage)}
  .empty .dot:nth-child(2){background:var(--lilac);animation-delay:.3s}
  .empty .dot:nth-child(3){background:var(--blush);animation-delay:.6s}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.35);opacity:1}}
  .empty h3{color:var(--ink);font-weight:600;font-size:17px;margin-bottom:6px}
  .empty p{font-size:14px}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translate(-50%,80px);
    background:var(--ink);color:#fff;font-size:13px;padding:11px 20px;border-radius:999px;
    opacity:0;transition:transform .4s cubic-bezier(.2,.8,.25,1), opacity .4s;pointer-events:none;
  }
  .toast.show{transform:translate(-50%,0);opacity:1}

  @media (max-width:520px){
    body{padding:22px 14px 60px}
    header{flex-direction:column;align-items:flex-start;gap:16px}
    .dates{grid-template-columns:1fr}
    .day{width:30px;height:30px;border-radius:10px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>Bloom</h1>
      <p>Your photo comes into focus as your habit grows.</p>
    </div>
    <button class="add-btn" id="toggleForm">+ New habit</button>
  </header>

  <section class="panel" id="panel" aria-label="Create a habit">
    <h2>New habit</h2>
    <div class="field">
      <label for="hName">Habit name</label>
      <input type="text" id="hName" maxlength="60" placeholder="e.g. Morning run, Read 20 pages…">
    </div>
    <div class="field">
      <div class="dates">
        <div>
          <label for="hStart">Start date</label>
          <input type="date" id="hStart">
        </div>
        <div>
          <label for="hEnd">End date</label>
          <input type="date" id="hEnd">
        </div>
      </div>
    </div>
    <div class="field">
      <label>Background photo (optional)</label>
      <div class="photo-drop" id="photoDrop" tabindex="0" role="button" aria-label="Choose a photo from your device">
        <span id="photoHint">Tap to choose a photo from your device</span>
        <input type="file" id="hPhoto" accept="image/*" hidden>
      </div>
    </div>
    <div class="form-error" id="formError"></div>
    <div class="panel-actions">
      <button class="btn btn-primary" id="saveHabit">Create habit</button>
      <button class="btn btn-ghost" id="cancelHabit">Cancel</button>
    </div>
  </section>

  <section class="habits" id="habits"></section>

  <div class="empty" id="empty" hidden>
    <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <h3>Nothing here yet</h3>
    <p>Create your first habit and watch it bloom, one day at a time.</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------- storage (persists in Claude artifacts; falls back to memory) ---------- */
  const mem = {};
  const store = {
    async get(k){
      if (window.storage) {
        try { const r = await window.storage.get(k); return r ? r.value : null; }
        catch(e){ return null; }
      }
      return mem[k] ?? null;
    },
    async set(k,v){
      if (window.storage) {
        try { await window.storage.set(k,v); return true; } catch(e){ return false; }
      }
      mem[k]=v; return true;
    },
    async del(k){
      if (window.storage) { try { await window.storage.delete(k); } catch(e){} }
      delete mem[k];
    }
  };

  const $ = id => document.getElementById(id);
  const panel=$("panel"), habitsEl=$("habits"), emptyEl=$("empty");
  const nameI=$("hName"), startI=$("hStart"), endI=$("hEnd"), photoI=$("hPhoto");
  const photoDrop=$("photoDrop"), photoHint=$("photoHint"), errEl=$("formError");

  let habits = [];          // [{id,name,start,end,done:[isoDates], hasPhoto}]
  const photoCache = {};    // id -> dataURL
  let pendingPhoto = null;

  /* ---------- helpers ---------- */
  const iso = d => d.toISOString().slice(0,10);
  const parse = s => { const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); };
  const todayIso = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  function daysBetween(a,b){
    const out=[]; const cur=parse(a), end=parse(b);
    while(cur<=end){ out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`); cur.setDate(cur.getDate()+1); }
    return out;
  }
  const fmt = s => parse(s).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
  const monthName = s => parse(s).toLocaleDateString(undefined,{month:"long",year:"numeric"});

  function toast(msg){
    const t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2200);
  }

  /* compress to keep each photo comfortably under the storage limit */
  function compressImage(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onerror=()=>reject(new Error("read failed"));
      reader.onload=()=>{
        const img=new Image();
        img.onerror=()=>reject(new Error("not an image"));
        img.onload=()=>{
          const MAX=1100;
          let w=img.width,h=img.height;
          if(Math.max(w,h)>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
          const c=document.createElement("canvas"); c.width=w; c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          resolve(c.toDataURL("image/jpeg",0.78));
        };
        img.src=reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /* ---------- persistence ---------- */
  async function load(){
    const raw = await store.get("habits-meta");
    if(raw){ try{ habits = JSON.parse(raw) || []; }catch(e){ habits=[]; } }
    for(const h of habits){
      if(h.hasPhoto){
        const p = await store.get("habitphoto-"+h.id);
        if(p) photoCache[h.id]=p;
      }
    }
    render();
  }
  async function saveMeta(){
    const ok = await store.set("habits-meta", JSON.stringify(habits));
    if(!ok) toast("Couldn't save — changes may not persist");
  }

  /* ---------- form ---------- */
  function resetForm(){
    nameI.value=""; pendingPhoto=null;
    photoDrop.classList.remove("has-img");
    photoDrop.innerHTML='<span id="photoHint2">Tap to choose a photo from your device</span>';
    photoDrop.appendChild(photoI);
    const t=todayIso();
    startI.value=t;
    const end=new Date(); end.setDate(end.getDate()+20);
    endI.value=iso(end);
    errEl.style.display="none";
  }

  $("toggleForm").addEventListener("click",()=>{
    const opening = !panel.classList.contains("open");
    panel.classList.toggle("open");
    if(opening){ resetForm(); nameI.focus(); }
  });
  $("cancelHabit").addEventListener("click",()=>panel.classList.remove("open"));

  photoDrop.addEventListener("click",()=>photoI.click());
  photoDrop.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); photoI.click(); }});
  photoI.addEventListener("change", async ()=>{
    const f=photoI.files[0]; if(!f) return;
    try{
      pendingPhoto = await compressImage(f);
      photoDrop.classList.add("has-img");
      photoDrop.innerHTML="";
      const img=document.createElement("img"); img.src=pendingPhoto; img.alt="Selected background";
      const x=document.createElement("button"); x.className="clear-photo"; x.textContent="✕"; x.setAttribute("aria-label","Remove photo");
      x.addEventListener("click",ev=>{ ev.stopPropagation(); pendingPhoto=null; photoDrop.classList.remove("has-img"); photoDrop.innerHTML='<span>Tap to choose a photo from your device</span>'; photoDrop.appendChild(photoI); });
      photoDrop.append(img,x,photoI);
    }catch(e){ showErr("That file couldn't be used as an image. Try another one."); }
  });

  function showErr(msg){ errEl.textContent=msg; errEl.style.display="block"; }

  $("saveHabit").addEventListener("click", async ()=>{
    const name=nameI.value.trim();
    if(!name) return showErr("Give your habit a name.");
    if(!startI.value || !endI.value) return showErr("Pick both a start and an end date.");
    if(parse(endI.value) < parse(startI.value)) return showErr("End date needs to be after the start date.");
    if(daysBetween(startI.value,endI.value).length>366) return showErr("Keep it under a year — long journeys work better in chapters.");

    const id = "h"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const habit = { id, name, start:startI.value, end:endI.value, done:[], hasPhoto:!!pendingPhoto };
    if(pendingPhoto){
      photoCache[id]=pendingPhoto;
      const ok = await store.set("habitphoto-"+id, pendingPhoto);
      if(!ok){ habit.hasPhoto=false; toast("Photo too large to save — habit created without it"); }
    }
    habits.unshift(habit);
    await saveMeta();
    panel.classList.remove("open");
    render();
    toast("Habit created");
  });

  /* ---------- rendering ---------- */
  function render(){
    habitsEl.innerHTML="";
    emptyEl.hidden = habits.length>0;
    habits.forEach((h,idx)=>habitsEl.appendChild(card(h,idx)));
  }

  function card(h, idx){
    const days = daysBetween(h.start,h.end);
    const doneSet = new Set(h.done);
    const pct = Math.round((h.done.length/days.length)*100);
    const today = todayIso();

    const el=document.createElement("article");
    el.className="habit";
    el.style.animationDelay=(idx*0.07)+"s";

    if(h.hasPhoto && photoCache[h.id]){
      const bg=document.createElement("div"); bg.className="habit-bg";
      bg.style.backgroundImage=`url(${photoCache[h.id]})`;
      const veil=document.createElement("div"); veil.className="habit-veil";
      // signature: photo sharpens & brightens as progress grows
      const blur = 14 - (pct/100)*14;
      bg.style.filter=`blur(${blur.toFixed(1)}px) saturate(${0.7+0.5*pct/100})`;
      veil.style.opacity = (1 - 0.45*(pct/100)).toFixed(2);
      el.append(bg,veil);
      el._bg=bg; el._veil=veil;
    }

    const inner=document.createElement("div"); inner.className="habit-inner";
    inner.innerHTML=`
      <div class="habit-top">
        <div>
          <div class="habit-name"></div>
          <div class="habit-range">${fmt(h.start)} → ${fmt(h.end)} · ${days.length} days</div>
        </div>
        <button class="habit-del" aria-label="Delete habit" title="Delete">✕</button>
      </div>
      <div class="progress-row">
        <div class="bar"><div class="bar-fill"></div></div>
        <div class="pct">${pct}%</div>
      </div>`;
    inner.querySelector(".habit-name").textContent=h.name;

    inner.querySelector(".habit-del").addEventListener("click", async ()=>{
      habits = habits.filter(x=>x.id!==h.id);
      await saveMeta();
      await store.del("habitphoto-"+h.id);
      delete photoCache[h.id];
      render();
      toast("Habit removed");
    });

    // day grid, grouped by month
    let curMonth="";
    let grid=null;
    days.forEach(d=>{
      const m=monthName(d);
      if(m!==curMonth){
        curMonth=m;
        const lab=document.createElement("div"); lab.className="month-label"; lab.textContent=m;
        inner.appendChild(lab);
        grid=document.createElement("div"); grid.className="day-grid";
        inner.appendChild(grid);
      }
      const b=document.createElement("button");
      b.className="day"; b.textContent=parse(d).getDate();
      b.title=fmt(d);
      if(doneSet.has(d)) b.classList.add("done");
      if(d===today) b.classList.add("today");
      if(d>today){ b.classList.add("future"); b.disabled=true; }
      else{
        b.addEventListener("click", async ()=>{
          const i=h.done.indexOf(d);
          if(i>=0){ h.done.splice(i,1); b.classList.remove("done","pop"); }
          else{ h.done.push(d); b.classList.add("done","pop"); setTimeout(()=>b.classList.remove("pop"),500); }
          updateProgress(el,h,days.length);
          await saveMeta();
        });
      }
      grid.appendChild(b);
    });

    el.appendChild(inner);
    requestAnimationFrame(()=>{ inner.querySelector(".bar-fill").style.width=pct+"%"; });
    return el;
  }

  function updateProgress(el,h,total){
    const pct=Math.round((h.done.length/total)*100);
    el.querySelector(".bar-fill").style.width=pct+"%";
    el.querySelector(".pct").textContent=pct+"%";
    if(el._bg){
      const blur = 14 - (pct/100)*14;
      el._bg.style.filter=`blur(${blur.toFixed(1)}px) saturate(${0.7+0.5*pct/100})`;
      el._veil.style.opacity=(1 - 0.45*(pct/100)).toFixed(2);
    }
  }

  resetForm();
  load();
})();
</script>
</body>
</html>
