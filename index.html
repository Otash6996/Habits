<!-- Habit Tracker — single-file HTML app -->
<style>
  * { box-sizing: border-box; margin: 0; }
  :root {
    --bg: #0B0D12; --card: rgba(255,255,255,.045); --line: rgba(255,255,255,.07);
    --text: #F2F4F8; --muted: #8B919E; --faint: #5A6070;
    --g1: #34D399; --g2: #22D3EE; --amber: #FFB74D;
    --grad: linear-gradient(135deg, #34D399, #22D3EE);
  }
  html, body { background: var(--bg); }
  .app {
    max-width: 560px; margin: 0 auto; padding: 20px 16px 56px;
    font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, sans-serif;
    color: var(--text); min-height: 100vh;
    background: radial-gradient(1200px 500px at 50% -10%, #141A26 0%, #0B0D12 60%);
  }

  @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .rise { animation: riseIn .45s cubic-bezier(.2,.8,.3,1) both; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .header-date { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .header-title { font-size: 32px; margin-top: 2px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(90deg, #F2F4F8, #9DB4C9); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .btn-add {
    width: 48px; height: 48px; border-radius: 16px; border: none; cursor: pointer;
    background: var(--grad); color: #06281C;
    box-shadow: 0 6px 20px rgba(52,211,153,.25); transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(52,211,153,.35); }
  .btn-add:active { transform: scale(.92); }
  .plus { font-size: 26px; font-weight: 700; line-height: 1; transition: transform .25s cubic-bezier(.2,.8,.3,1); display: block; }
  .plus.rot { transform: rotate(45deg); }

  .ring-wrap { position: relative; flex-shrink: 0; }
  .ring-arc { transition: stroke-dashoffset .6s cubic-bezier(.2,.8,.3,1); }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; }

  .tabs { position: relative; display: flex; background: rgba(255,255,255,.05); border: 1px solid var(--line);
    border-radius: 14px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 9px 0; border: none; background: none; color: var(--muted); font-weight: 700;
    font-size: 14px; cursor: pointer; font-family: inherit; position: relative; z-index: 1; transition: color .2s; }
  .tab.on { color: #0B0D12; }
  .tab-pill { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px);
    background: var(--grad); border-radius: 11px; transition: transform .3s cubic-bezier(.2,.8,.3,1); }
  .tab-pill.right { transform: translateX(100%); }

  .save-error { background: rgba(244,67,54,.12); color: #FF8A80; border: 1px solid rgba(244,67,54,.25);
    border-radius: 12px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; }

  .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
  .empty-emoji { font-size: 44px; margin-bottom: 10px; }
  .empty p { margin: 4px 0; font-size: 16px; }
  .empty-sub { font-size: 14px; max-width: 320px; margin: 6px auto 0; }

  .card {
    background: var(--card); border: 1px solid var(--line); backdrop-filter: blur(8px);
    border-radius: 20px; padding: 16px; margin-bottom: 14px; transition: border-color .2s;
  }
  .card:hover { border-color: rgba(255,255,255,.13); }
  .card-finished { opacity: .65; }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
  .card-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .card-emoji { font-size: 26px; flex-shrink: 0; }
  .card-title { font-size: 17px; font-weight: 700; }
  .card-sub { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 1px; }
  .streak { color: var(--amber); }
  .goal { background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
  .card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-delete { background: none; border: none; font-size: 15px; cursor: pointer; opacity: .3; padding: 6px; transition: opacity .15s; }
  .btn-delete:hover { opacity: .8; }

  .strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent; }
  .day-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .day-month { font-size: 9px; color: var(--faint); font-weight: 800; height: 12px; text-transform: uppercase; }
  .day-wd { font-size: 10px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .day-dot {
    width: 40px; height: 40px; border-radius: 13px; border: 1.5px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.03); color: #9AA1AD; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: transform .12s, background .15s, border-color .15s;
  }
  .day-dot:hover:not(.future) { border-color: rgba(52,211,153,.5); }
  .day-dot:active:not(.future) { transform: scale(.85); }
  @keyframes pop { 0% { transform: scale(.6); } 60% { transform: scale(1.12); } 100% { transform: scale(1); } }
  .day-dot.done {
    background: var(--grad); border-color: transparent; color: #06281C; font-size: 16px;
    animation: pop .3s cubic-bezier(.2,.8,.3,1); box-shadow: 0 4px 14px rgba(52,211,153,.3);
  }
  .day-dot.today:not(.done) { border-color: var(--amber); border-width: 2px; color: var(--text); }
  .day-dot.future { opacity: .25; cursor: default; }
  .strip-hint { font-size: 11px; color: var(--faint); text-align: center; margin-top: 4px; }

  .section-label { font-size: 12px; font-weight: 800; color: var(--faint); text-transform: uppercase; letter-spacing: .08em; margin: 22px 0 10px; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat-card { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 8px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-cap { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 2px; }

  .chart-title { font-size: 16px; font-weight: 800; }
  .chart-sub { font-size: 12px; color: var(--muted); font-weight: 600; margin: 2px 0 14px; }
  .bars { display: flex; gap: 5px; align-items: flex-end; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
  .bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  @keyframes grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  .bar-fill { width: 100%; border-radius: 6px 6px 3px 3px; background: rgba(52,211,153,.35);
    transform-origin: bottom; animation: grow .5s cubic-bezier(.2,.8,.3,1) both; }
  .bar-today { background: linear-gradient(180deg, #34D399, #22D3EE); box-shadow: 0 0 14px rgba(52,211,153,.35); }
  .bar-day { font-size: 10px; color: var(--faint); font-weight: 700; margin-top: 6px; }
  .bar-day.on { color: var(--g1); }

  .spark-card { padding-bottom: 10px; }
  .spark-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 8px; }
  .spark-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spark-num { font-size: 12px; color: var(--muted); font-weight: 700; flex-shrink: 0; }
  .spark { width: 100%; height: 56px; display: block; }
  @keyframes draw { from { stroke-dasharray: 600; stroke-dashoffset: 600; } to { stroke-dasharray: 600; stroke-dashoffset: 0; } }
  .spark-line { animation: draw 1.1s cubic-bezier(.4,0,.2,1) both; }

  .form-name-row { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
  @keyframes glowPop { 0% { transform: scale(.5) rotate(-12deg); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
  .form-emoji { font-size: 28px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.06); border-radius: 14px; flex-shrink: 0; }
  .form-emoji.glow { animation: glowPop .35s cubic-bezier(.2,.8,.3,1); box-shadow: 0 0 0 1.5px rgba(52,211,153,.4); }
  .suggest-hint { font-size: 11px; color: var(--g1); font-weight: 600; margin-bottom: 8px; min-height: 14px; }

  .input {
    width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 13px;
    border: 1.5px solid rgba(255,255,255,.1); margin-bottom: 12px; font-family: inherit;
    background: rgba(255,255,255,.04); color: var(--text); color-scheme: dark; transition: border-color .15s;
  }
  .input:focus { outline: none; border-color: var(--g1); }
  .input::placeholder { color: var(--faint); }
  .form-name-row .input { margin-bottom: 0; }

  .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .emoji-btn { font-size: 19px; padding: 7px 9px; border-radius: 11px; border: 1.5px solid transparent;
    background: rgba(255,255,255,.05); cursor: pointer; transition: transform .12s, border-color .15s; }
  .emoji-btn:hover { transform: translateY(-2px); }
  .emoji-btn.sel { border-color: var(--g1); background: rgba(52,211,153,.12); }

  .field-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #B8BEC9; }
  .field-hint { font-weight: 500; color: var(--faint); }
  .dur-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .dur-btn { padding: 8px 13px; border-radius: 11px; border: 1.5px solid rgba(255,255,255,.1);
    background: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: #B8BEC9; transition: all .15s; }
  .dur-btn:hover { border-color: rgba(52,211,153,.5); }
  .dur-btn.sel { background: var(--grad); border-color: transparent; color: #06281C; }

  .form-summary { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 14px; }
  .form-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary { padding: 12px 22px; border-radius: 13px; border: none; background: var(--grad);
    color: #06281C; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: transform .15s; box-shadow: 0 6px 20px rgba(52,211,153,.2); }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .35; cursor: default; box-shadow: none; }
  .btn-ghost { padding: 12px 18px; border-radius: 13px; border: none; background: rgba(255,255,255,.07);
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; color: #B8BEC9; }
  .btn-danger { padding: 12px 18px; border-radius: 13px; border: none; background: #E53935; color: #fff;
    font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; }

  .modal-bg { position: fixed; inset: 0; background: rgba(5,7,10,.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px; animation: riseIn .2s both; }
  .modal { background: #161A22; border: 1px solid rgba(255,255,255,.1); border-radius: 18px;
    padding: 22px; max-width: 320px; width: 100%; animation: riseIn .25s cubic-bezier(.2,.8,.3,1) both; }
  .modal p { margin-bottom: 18px; font-size: 16px; font-weight: 700; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  .hidden { display: none !important; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>

<div class="app">
  <header class="header">
    <div>
      <div class="header-date" id="headerDate"></div>
      <h1 class="header-title">Habits</h1>
    </div>
    <div class="header-right">
      <div id="headerRing"></div>
      <button class="btn-add" id="btnAdd" aria-label="Add habit"><span class="plus" id="plusIcon">+</span></button>
    </div>
  </header>

  <div class="tabs hidden" id="tabs">
    <button class="tab on" id="tabToday">Today</button>
    <button class="tab" id="tabProgress">Progress</button>
    <div class="tab-pill" id="tabPill"></div>
  </div>

  <div class="save-error hidden" id="saveError">Couldn't save your last change. Check your connection and try again.</div>

  <!-- Add form -->
  <div class="card form hidden" id="form">
    <div class="form-name-row">
      <div class="form-emoji" id="formEmoji">✨</div>
      <input class="input" id="fName" placeholder="Habit name — e.g. Vitamin D" maxlength="40">
    </div>
    <div class="suggest-hint" id="suggestHint"></div>
    <div class="emoji-row" id="emojiRow"></div>
    <label class="field-label">Start date <span class="field-hint">(can be in the past)</span></label>
    <input class="input" type="date" id="fStart">
    <label class="field-label">For how long?</label>
    <div class="dur-row" id="durRow"></div>
    <input class="input hidden" type="number" min="1" id="fCustom" placeholder="Number of days">
    <div class="form-summary" id="formSummary"></div>
    <div class="form-btns">
      <button class="btn-ghost" id="fCancel">Cancel</button>
      <button class="btn-primary" id="fSubmit" disabled>Start habit</button>
    </div>
  </div>

  <div id="viewToday"></div>
  <div id="viewProgress" class="hidden"></div>
</div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <p>Delete this habit and all its history?</p>
    <div class="modal-btns">
      <button class="btn-ghost" id="mCancel">Keep it</button>
      <button class="btn-danger" id="mDelete">Delete</button>
    </div>
  </div>
</div>

<script>
// ---------- date helpers (local timezone) ----------
const toStr = d => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
};
const fromStr = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const addDays = (s,n) => { const d = fromStr(s); d.setDate(d.getDate()+n); return toStr(d); };
const diffDays = (a,b) => Math.round((fromStr(b)-fromStr(a))/86400000);
const todayStr = () => toStr(new Date());
const WD = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const WD_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ---------- smart emoji suggestion ----------
const EMOJI_RULES = [
  [["vitamin","pill","supplement","omega","magnesium","zinc","med"],"💊"],
  [["water","drink","hydrat"],"💧"],
  [["run","jog","cardio","sprint"],"🏃"],
  [["walk","steps","10000","10k"],"🚶"],
  [["gym","workout","lift","strength","train","exercise","push up","pushup","squat"],"💪"],
  [["read","book","pages"],"📖"],
  [["sleep","bed early","bedtime","8 hours"],"💤"],
  [["meditat","mindful","breath","calm"],"🧘"],
  [["yoga","stretch","mobility"],"🤸"],
  [["journal","write","diary","gratitude"],"✍️"],
  [["teeth","floss","brush","dental"],"🦷"],
  [["smoke","smoking","vape","nicotine"],"🚭"],
  [["salad","vegetable","veggie","healthy eat","diet","no sugar","sugar"],"🥗"],
  [["fruit","apple"],"🍎"],
  [["wake","morning","early rise","6am","5am"],"🌅"],
  [["code","program","leetcode","develop"],"💻"],
  [["study","learn","language","english","course","duolingo"],"📚"],
  [["guitar","piano","music"],"🎸"],
  [["draw","paint","sketch","art"],"🎨"],
  [["pray","quran","bible","namaz"],"🙏"],
  [["shower","cold"],"🚿"],
  [["swim"],"🏊"],
  [["bike","cycle","cycling"],"🚴"],
  [["save","money","budget","spend"],"💰"],
  [["phone","screen","social media","instagram","scroll"],"📵"],
  [["protein","shake","creatine"],"🥤"],
  [["skin","skincare","cream"],"🧴"],
  [["clean","tidy","room"],"🧹"],
  [["sun","outside","nature","fresh air"],"☀️"],
];
const suggestEmoji = name => {
  const n = name.toLowerCase();
  for (const [keys, e] of EMOJI_RULES) if (keys.some(k => n.includes(k))) return e;
  return "✨";
};
const EMOJIS = ["💊","💧","🏃","💪","📖","🧘","💤","🥗","✍️","🦷","🌅","💻","📚","🚭","✨"];
const DURATIONS = [["7 days",7],["14 days",14],["21 days",21],["30 days",30],["60 days",60],["90 days",90],["No end",0]];

const STORAGE_KEY = "habit-tracker-v1";

// ---------- state ----------
let habits = [];
let tab = "today";
let deleteId = null;
let form = { emoji: "✨", manual: false, duration: 30, custom: false };

// ---------- storage ----------
async function load() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) habits = JSON.parse(r.value);
  } catch (e) { /* no data yet */ }
  render();
}
async function persist() {
  render();
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(habits));
    document.getElementById("saveError").classList.add("hidden");
  } catch (e) {
    document.getElementById("saveError").classList.remove("hidden");
  }
}

// ---------- ring svg ----------
function ringHTML(pct, size, label) {
  const r = size/2 - 4, c = 2*Math.PI*r;
  const off = c * (1 - Math.min(pct, 1));
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="rgba(255,255,255,.09)" stroke-width="4" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="url(#rg)" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" class="ring-arc"/>
    </svg>
    <div class="ring-label">${label}</div>
  </div>`;
}

// ---------- habit card ----------
function habitCardHTML(h, today, index, finished) {
  const last = h.end || (today > h.start ? today : h.start);
  const n = diffDays(h.start, last) + 1;
  const days = Array.from({length: n}, (_, i) => addDays(h.start, i));

  const doneCount = days.filter(d => h.done[d]).length;
  const total = h.end ? days.length : null;
  const elapsed = days.filter(d => d <= today).length;

  let streak = 0, cursor = h.done[today] ? today : addDays(today, -1);
  while (cursor >= h.start && h.done[cursor]) { streak++; cursor = addDays(cursor, -1); }

  const pct = total ? doneCount/total : (elapsed ? doneCount/elapsed : 0);
  const goal = total && doneCount >= total;

  let monthShown = null;
  const dots = days.map(dStr => {
    const dd = fromStr(dStr);
    const isToday = dStr === today, isFuture = dStr > today, isDone = !!h.done[dStr];
    const showMonth = monthShown !== dd.getMonth();
    if (showMonth) monthShown = dd.getMonth();
    return `<div class="day-col">
      <div class="day-month">${showMonth ? MO[dd.getMonth()] : "&nbsp;"}</div>
      <div class="day-wd">${WD[dd.getDay()]}</div>
      <button class="day-dot${isDone?" done":""}${isToday?" today":""}${isFuture?" future":""}"
        ${isFuture ? "disabled" : ""} data-habit="${h.id}" data-date="${dStr}" ${isToday ? 'data-today="1"' : ""}
        aria-label="${dStr} ${isDone?"done":"not done"}">${isDone ? "✓" : dd.getDate()}</button>
    </div>`;
  }).join("");

  return `<div class="card rise${finished?" card-finished":""}" style="animation-delay:${index*70}ms">
    <div class="card-top">
      <div class="card-name">
        <span class="card-emoji">${h.emoji}</span>
        <div>
          <div class="card-title">${esc(h.name)}</div>
          <div class="card-sub">${doneCount}${total?` / ${total}`:""} days${streak>1?`<span class="streak"> · 🔥 ${streak} in a row</span>`:""}${goal?`<span class="goal"> · 🎉 goal reached</span>`:""}</div>
        </div>
      </div>
      <div class="card-right">
        ${ringHTML(pct, 46, Math.round(pct*100)+"%")}
        <button class="btn-delete" data-del="${h.id}" aria-label="Delete habit">🗑</button>
      </div>
    </div>
    <div class="strip" data-strip="${h.id}">${dots}</div>
    <div class="strip-hint">Tap any past day to mark it done</div>
  </div>`;
}

// ---------- progress view ----------
function progressHTML(today) {
  const days14 = Array.from({length:14}, (_,i) => addDays(today, i-13));
  const bars = days14.map((d,i) => {
    const due = habits.filter(h => h.start <= d && (!h.end || h.end >= d));
    const done = due.filter(h => h.done[d]).length;
    const pct = due.length ? done/due.length : 0;
    const dd = fromStr(d);
    const isToday = d === today;
    return `<div class="bar-col" title="${done}/${due.length}">
      <div class="bar-track"><div class="bar-fill${isToday?" bar-today":""}" style="height:${Math.max(pct*100, due.length?4:0)}%;animation-delay:${i*40}ms"></div></div>
      <div class="bar-day${isToday?" on":""}">${dd.getDate()}</div>
    </div>`;
  }).join("");

  const totalDone = habits.reduce((s,h) => s + Object.keys(h.done).length, 0);
  const bestStreak = habits.reduce((best,h) => {
    let b=0, cur=0, c=h.start;
    while (c <= today) { cur = h.done[c] ? cur+1 : 0; if (cur>b) b=cur; c = addDays(c,1); }
    return Math.max(best,b);
  }, 0);

  const sparks = habits.map((h,i) => sparkHTML(h, today, i)).join("");

  return `<div class="rise">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${totalDone}</div><div class="stat-cap">check-ins total</div></div>
      <div class="stat-card"><div class="stat-num">🔥 ${bestStreak}</div><div class="stat-cap">best streak</div></div>
      <div class="stat-card"><div class="stat-num">${habits.length}</div><div class="stat-cap">habits</div></div>
    </div>
    <div class="card">
      <div class="chart-title">Last 14 days</div>
      <div class="chart-sub">Share of habits completed each day</div>
      <div class="bars">${bars}</div>
    </div>
    ${sparks}
  </div>`;
}

function sparkHTML(h, today, index) {
  const last = h.end && h.end < today ? h.end : today;
  const n = diffDays(h.start, last) + 1;
  let cum = 0;
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (h.done[addDays(h.start, i)]) cum++;
    pts.push(cum);
  }
  const maxCum = Math.max(cum, 1), W = 280, H = 56;
  const x = i => n === 1 ? W : (i/(n-1))*W;
  const y = c => H - (c/maxCum)*(H-6) - 2;
  const line = pts.map((c,i) => `${i===0?"M":"L"}${x(i).toFixed(1)},${y(c).toFixed(1)}`).join(" ");
  const area = `${line} L${W},${H} L0,${H} Z`;
  const total = h.end ? diffDays(h.start, h.end)+1 : null;
  const pct = total ? Math.round((cum/total)*100) : null;

  return `<div class="card spark-card rise" style="animation-delay:${100+index*70}ms">
    <div class="spark-head">
      <span class="spark-name">${h.emoji} ${esc(h.name)}</span>
      <span class="spark-num">${cum}${total?` / ${total}`:""}${pct!==null?` · ${pct}%`:""}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="spark" preserveAspectRatio="none">
      <path d="${area}" fill="url(#sg)"/>
      <path d="${line}" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" class="spark-line"/>
    </svg>
  </div>`;
}

// ---------- main render ----------
function render() {
  const today = todayStr();
  const d = fromStr(today);
  document.getElementById("headerDate").textContent = `${WD_FULL[d.getDay()]}, ${MO[d.getMonth()]} ${d.getDate()}`;

  const active = habits.filter(h => !h.end || h.end >= today);
  const finished = habits.filter(h => h.end && h.end < today);
  const dueToday = active.filter(h => h.start <= today);
  const doneToday = dueToday.filter(h => h.done[today]).length;

  document.getElementById("headerRing").innerHTML = dueToday.length
    ? ringHTML(doneToday/dueToday.length, 52, `${doneToday}/${dueToday.length}`) : "";

  document.getElementById("tabs").classList.toggle("hidden", habits.length === 0);

  // preserve strip scroll positions
  const scrolls = {};
  document.querySelectorAll("[data-strip]").forEach(el => scrolls[el.dataset.strip] = el.scrollLeft);

  const vt = document.getElementById("viewToday");
  if (habits.length === 0 && document.getElementById("form").classList.contains("hidden")) {
    vt.innerHTML = `<div class="empty rise"><div class="empty-emoji">🌱</div><p>No habits yet.</p>
      <p class="empty-sub">Tap + to start one — you can set a start date in the past and fill in days you've already done.</p></div>`;
  } else {
    vt.innerHTML =
      active.map((h,i) => habitCardHTML(h, today, i, false)).join("") +
      (finished.length ? `<div class="section-label">Finished</div>` : "") +
      finished.map((h,i) => habitCardHTML(h, today, i, true)).join("");
  }

  document.getElementById("viewProgress").innerHTML = progressHTML(today);

  // restore / initialize strip scroll
  document.querySelectorAll("[data-strip]").forEach(el => {
    if (scrolls[el.dataset.strip] !== undefined) {
      el.scrollLeft = scrolls[el.dataset.strip];
    } else {
      const t = el.querySelector("[data-today]");
      if (t) el.scrollLeft = t.parentElement.offsetLeft - el.clientWidth/2 + 20;
    }
  });

  document.getElementById("viewToday").classList.toggle("hidden", tab !== "today");
  document.getElementById("viewProgress").classList.toggle("hidden", tab !== "progress");
}

// ---------- events (delegated) ----------
document.addEventListener("click", e => {
  const dot = e.target.closest(".day-dot");
  if (dot && !dot.disabled) {
    const id = dot.dataset.habit, date = dot.dataset.date;
    if (date > todayStr()) return;
    const h = habits.find(x => x.id === id);
    if (h.done[date]) delete h.done[date]; else h.done[date] = true;
    persist();
    return;
  }
  const del = e.target.closest("[data-del]");
  if (del) {
    deleteId = del.dataset.del;
    document.getElementById("modalBg").classList.remove("hidden");
  }
});

document.getElementById("mCancel").onclick = () => document.getElementById("modalBg").classList.add("hidden");
document.getElementById("modalBg").onclick = e => { if (e.target.id === "modalBg") e.currentTarget.classList.add("hidden"); };
document.getElementById("mDelete").onclick = () => {
  habits = habits.filter(h => h.id !== deleteId);
  document.getElementById("modalBg").classList.add("hidden");
  persist();
};

// tabs
function setTab(t) {
  tab = t;
  document.getElementById("tabToday").classList.toggle("on", t === "today");
  document.getElementById("tabProgress").classList.toggle("on", t === "progress");
  document.getElementById("tabPill").classList.toggle("right", t === "progress");
  document.getElementById("viewToday").classList.toggle("hidden", t !== "today");
  const vp = document.getElementById("viewProgress");
  vp.classList.toggle("hidden", t !== "progress");
  if (t === "progress") vp.innerHTML = progressHTML(todayStr()); // re-trigger animations
}
document.getElementById("tabToday").onclick = () => setTab("today");
document.getElementById("tabProgress").onclick = () => setTab("progress");

// ---------- add form ----------
const fName = document.getElementById("fName");
const fStart = document.getElementById("fStart");
const fCustom = document.getElementById("fCustom");
const formEl = document.getElementById("form");

document.getElementById("emojiRow").innerHTML = EMOJIS.map(e => `<button class="emoji-btn" data-emoji="${e}">${e}</button>`).join("");
document.getElementById("durRow").innerHTML =
  DURATIONS.map(([l,v]) => `<button class="dur-btn" data-dur="${v}">${l}</button>`).join("") +
  `<button class="dur-btn" data-dur="custom">Custom</button>`;

function refreshForm() {
  document.getElementById("formEmoji").textContent = form.emoji;
  document.querySelectorAll("[data-emoji]").forEach(b => b.classList.toggle("sel", b.dataset.emoji === form.emoji));
  document.querySelectorAll("[data-dur]").forEach(b => {
    const isCustom = b.dataset.dur === "custom";
    b.classList.toggle("sel", form.custom ? isCustom : (!isCustom && Number(b.dataset.dur) === form.duration));
  });
  fCustom.classList.toggle("hidden", !form.custom);

  const name = fName.value.trim();
  document.getElementById("suggestHint").textContent =
    (!form.manual && name) ? "Icon suggested from the name — tap below to change it" : "";
  document.getElementById("fSubmit").disabled = !name;

  const dur = form.custom ? (parseInt(fCustom.value, 10) || 0) : form.duration;
  const end = dur > 0 ? addDays(fStart.value, dur - 1) : null;
  const s = fromStr(fStart.value);
  const endLabel = end ? `${fromStr(end).getDate()} ${MO[fromStr(end).getMonth()]}` : "ongoing";
  document.getElementById("formSummary").textContent =
    `${form.emoji} ${name || "…"} · starts ${s.getDate()} ${MO[s.getMonth()]} · ends ${endLabel}`;
}

fName.addEventListener("input", () => {
  if (!form.manual) {
    const next = suggestEmoji(fName.value);
    if (next !== form.emoji) {
      form.emoji = next;
      const el = document.getElementById("formEmoji");
      el.classList.remove("glow"); void el.offsetWidth; el.classList.add("glow");
    }
  }
  refreshForm();
});
fStart.addEventListener("input", refreshForm);
fCustom.addEventListener("input", refreshForm);

formEl.addEventListener("click", e => {
  const em = e.target.closest("[data-emoji]");
  if (em) { form.emoji = em.dataset.emoji; form.manual = true; refreshForm(); return; }
  const du = e.target.closest("[data-dur]");
  if (du) {
    if (du.dataset.dur === "custom") form.custom = true;
    else { form.custom = false; form.duration = Number(du.dataset.dur); }
    refreshForm();
  }
});

function openForm(open) {
  formEl.classList.toggle("hidden", !open);
  document.getElementById("plusIcon").classList.toggle("rot", open);
  if (open) {
    form = { emoji: "✨", manual: false, duration: 30, custom: false };
    fName.value = ""; fCustom.value = "";
    fStart.value = todayStr(); fStart.max = todayStr();
    refreshForm();
    fName.focus();
    setTab("today");
  }
  render();
}
document.getElementById("btnAdd").onclick = () => openForm(formEl.classList.contains("hidden"));
document.getElementById("fCancel").onclick = () => openForm(false);
document.getElementById("fSubmit").onclick = () => {
  const name = fName.value.trim();
  if (!name) return;
  const dur = form.custom ? (parseInt(fCustom.value, 10) || 0) : form.duration;
  habits.push({
    id: Date.now().toString(36),
    name, emoji: form.emoji,
    start: fStart.value,
    end: dur > 0 ? addDays(fStart.value, dur - 1) : null,
    done: {},
  });
  openForm(false);
  persist();
};

// shared svg gradients
const defs = document.createElementNS("http://www.w3.org/2000/svg", "svg");
defs.setAttribute("width", "0"); defs.setAttribute("height", "0");
defs.style.position = "absolute";
defs.innerHTML = `<defs>
  <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#34D399" stop-opacity="0.35"/><stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
  </linearGradient>
</defs>`;
document.body.appendChild(defs);

load();
</script>
