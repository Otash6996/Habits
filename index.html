<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ritual — Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F4F3;
  --surface:#FFFFFF;
  --surface-2:#FAFBFA;
  --ink:#15211D;
  --ink-2:#5C6B66;
  --ink-3:#94A29D;
  --line:#E4E9E7;
  --pine:#2F7E6D;
  --pine-soft:#E3F0EC;
  --flame:#F2A33C;
  --flame-soft:#FCEFD9;
  --danger:#D8604F;
  --radius:20px;
  --shadow:0 1px 2px rgba(21,33,29,.04), 0 8px 24px -12px rgba(21,33,29,.12);
  --shadow-lift:0 2px 4px rgba(21,33,29,.05), 0 16px 40px -16px rgba(21,33,29,.22);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  font-size:15px;
  line-height:1.5;
  padding-bottom:110px;
}
.wrap{max-width:640px;margin:0 auto;padding:0 18px}
h1,h2,h3,.display{font-family:'Sora','Inter',sans-serif}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,select{font:inherit;color:inherit}
svg{display:block}
.num{font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{padding:34px 0 10px}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--pine);margin-bottom:6px}
.head-title{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
.head-sub{color:var(--ink-2);font-size:13.5px;margin-top:6px}
/* progress ring */
.ring-wrap{position:relative;width:84px;height:84px;flex:0 0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{stroke:var(--line)}
.ring-fg{stroke:var(--pine);stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-label b{font-family:'Sora';font-size:17px;letter-spacing:-.02em}
.ring-label span{font-size:9.5px;color:var(--ink-3);font-weight:600;letter-spacing:.08em;text-transform:uppercase}

/* ---------- sections ---------- */
.section-label{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 12px}
.section-label h2{font-size:15px;font-weight:600;letter-spacing:-.01em}
.section-label span{font-size:12.5px;color:var(--ink-3)}

/* ---------- habit card ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px 16px 14px;
  margin-bottom:12px;
  animation:rise .5s var(--ease) backwards;
  transition:box-shadow .3s var(--ease), transform .3s var(--ease);
}
.card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.07s}
.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.17s}
.card:nth-child(5){animation-delay:.22s}.card:nth-child(6){animation-delay:.27s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card-cover{
  height:62px;margin:-16px -16px 0;
  border-radius:19px 19px 0 0;
  position:relative;overflow:hidden;
}
.card-cover::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to top, rgba(255,255,255,.16), transparent 55%);
}
.card.has-cover .card-top{margin-top:-26px;align-items:flex-end}
.card.has-cover .chip{width:50px;height:50px;border-radius:16px;border:3px solid var(--surface);box-shadow:0 2px 8px rgba(21,33,29,.14)}
.card.has-cover .card-info{padding-bottom:3px}
.card.has-cover .streak,.card.has-cover .expander{margin-bottom:5px}
.card-top{display:flex;align-items:center;gap:12px}
.chip{
  width:44px;height:44px;border-radius:14px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  color:#fff;
}
.chip svg{width:22px;height:22px}
.card-name{font-weight:600;font-size:15.5px;letter-spacing:-.01em}
.card-meta{font-size:12px;color:var(--ink-3);margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-info{flex:1;min-width:0}
.streak{
  display:flex;align-items:center;gap:5px;
  background:var(--flame-soft);color:#B0731F;
  font-weight:600;font-size:13.5px;
  padding:6px 11px;border-radius:999px;flex:0 0 auto;
}
.streak svg{width:14px;height:14px}
.streak.lit{animation:flicker .6s var(--ease)}
.streak.cold{background:var(--surface-2);color:var(--ink-3)}
@keyframes flicker{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.expander{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:background .2s,transform .35s var(--ease)}
.expander:hover{background:var(--surface-2)}
.expander svg{width:17px;height:17px}
.card.open .expander{transform:rotate(180deg)}

/* week pebbles */
.week{display:flex;justify-content:space-between;gap:6px;margin-top:14px}
.day{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.day-label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase}
.day-label.today{color:var(--pine)}
.pebble{
  width:36px;height:36px;max-width:100%;
  border-radius:12px;
  border:1.5px solid var(--line);
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  color:transparent;
  position:relative;
  transition:transform .15s var(--ease), background .25s, border-color .25s, color .25s;
}
.pebble svg{width:15px;height:15px}
.pebble:not(:disabled):active{transform:scale(.82)}
.pebble.done{color:#fff;border-color:transparent}
.pebble.done.pop{animation:pop .45s var(--ease)}
@keyframes pop{0%{transform:scale(.6)}55%{transform:scale(1.16)}100%{transform:scale(1)}}
.pebble.done.pop::after{
  content:"";position:absolute;inset:-1.5px;border-radius:12px;
  border:2px solid currentColor;opacity:0;
  animation:ringout .5s var(--ease);
}
@keyframes ringout{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.55);opacity:0}}
.pebble:disabled{opacity:.32;cursor:default}
.pebble.today-pebble{border-style:dashed;border-color:var(--ink-3)}
.pebble.done.today-pebble{border-style:solid}

/* expanded body */
.card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .45s var(--ease)}
.card.open .card-body{grid-template-rows:1fr}
.card-body-inner{overflow:hidden}
.body-pad{padding-top:16px}
.divider{height:1px;background:var(--line);margin:14px 0}
.mini-stats{display:flex;gap:8px}
.mini-stat{flex:1;background:var(--surface-2);border-radius:14px;padding:10px 12px}
.mini-stat b{font-family:'Sora';font-size:17px;display:block;letter-spacing:-.02em}
.mini-stat span{font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}

/* month calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.cal-title{font-weight:600;font-size:13.5px}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:background .2s}
.cal-nav button:hover{background:var(--surface-2)}
.cal-nav svg{width:15px;height:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:9.5px;font-weight:600;color:var(--ink-3);text-align:center;text-transform:uppercase;letter-spacing:.05em;padding:4px 0}
.cal-cell{
  aspect-ratio:1;border-radius:9px;font-size:12px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);background:var(--surface-2);
  transition:transform .15s var(--ease), background .2s, color .2s;
}
.cal-cell:not(:disabled):hover{background:var(--line)}
.cal-cell:not(:disabled):active{transform:scale(.85)}
.cal-cell.done{color:#fff;font-weight:600}
.cal-cell:disabled{opacity:.3;cursor:default}
.cal-cell.blank{visibility:hidden}
.cal-cell.today-cell{outline:1.5px dashed var(--ink-3);outline-offset:-1.5px}

.card-actions{display:flex;gap:8px;margin-top:14px}
.ghost-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px;border-radius:12px;font-weight:600;font-size:13px;
  background:var(--surface-2);color:var(--ink-2);transition:background .2s,color .2s;
}
.ghost-btn:hover{background:var(--line)}
.ghost-btn.danger{color:var(--danger)}
.ghost-btn.danger:hover{background:#FBEAE7}
.ghost-btn svg{width:15px;height:15px}

/* ---------- empty state ---------- */
.empty{
  text-align:center;padding:52px 24px;
  border:1.5px dashed var(--line);border-radius:var(--radius);
  animation:rise .5s var(--ease) backwards;
}
.empty .orb{
  width:64px;height:64px;margin:0 auto 16px;border-radius:22px;
  background:var(--pine-soft);color:var(--pine);
  display:flex;align-items:center;justify-content:center;
  animation:float 3.5s ease-in-out infinite;
}
.empty .orb svg{width:28px;height:28px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty h3{font-size:16px;margin-bottom:4px}
.empty p{color:var(--ink-2);font-size:13.5px}

/* ---------- insights ---------- */
.panel{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px;margin-bottom:12px;
  animation:rise .55s var(--ease) backwards;
}
.panel h3{font-size:13.5px;font-weight:600;margin-bottom:2px}
.panel .hint{font-size:12px;color:var(--ink-3);margin-bottom:14px}
/* bar chart */
.bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%}
.bar-track{flex:1;width:100%;max-width:34px;background:var(--surface-2);border-radius:9px;display:flex;align-items:flex-end;overflow:hidden}
.bar-fill{width:100%;background:var(--pine);border-radius:9px;transform-origin:bottom;animation:grow .9s var(--ease) backwards}
.bar-col:nth-child(2) .bar-fill{animation-delay:.05s}.bar-col:nth-child(3) .bar-fill{animation-delay:.1s}
.bar-col:nth-child(4) .bar-fill{animation-delay:.15s}.bar-col:nth-child(5) .bar-fill{animation-delay:.2s}
.bar-col:nth-child(6) .bar-fill{animation-delay:.25s}.bar-col:nth-child(7) .bar-fill{animation-delay:.3s}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.bar-fill.faint{background:var(--line)}
.bar-day{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.bar-day.today{color:var(--pine)}
/* heatmap */
.heat-scroll{overflow-x:auto;padding-bottom:4px}
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px;width:max-content}
.heat i{width:12px;height:12px;border-radius:3.5px;background:var(--surface-2);animation:fadein .6s var(--ease) backwards}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.heat-legend{display:flex;align-items:center;gap:5px;margin-top:10px;font-size:11px;color:var(--ink-3);justify-content:flex-end}
.heat-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ---------- FAB ---------- */
.fab{
  position:fixed;right:max(20px,calc(50% - 300px));bottom:26px;z-index:40;
  display:flex;align-items:center;gap:9px;
  background:var(--ink);color:#fff;
  padding:15px 22px 15px 18px;border-radius:999px;
  font-weight:600;font-size:14.5px;font-family:'Sora';letter-spacing:-.01em;
  box-shadow:0 10px 30px -8px rgba(21,33,29,.45);
  transition:transform .25s var(--ease), box-shadow .25s;
}
.fab:hover{transform:translateY(-2px);box-shadow:0 14px 34px -8px rgba(21,33,29,.5)}
.fab:active{transform:scale(.95)}
.fab svg{width:18px;height:18px}

/* ---------- modal ---------- */
.scrim{
  position:fixed;inset:0;background:rgba(21,33,29,.4);backdrop-filter:blur(3px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;
}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:50%;bottom:0;z-index:60;
  width:min(620px,100%);max-height:92vh;overflow-y:auto;
  background:var(--surface);border-radius:26px 26px 0 0;
  padding:14px 22px calc(26px + env(safe-area-inset-bottom));
  transform:translate(-50%,105%);
  transition:transform .45s var(--ease);
  box-shadow:var(--shadow-lift);
}
.sheet.show{transform:translate(-50%,0)}
.grab{width:40px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 18px}
.sheet h2{font-size:20px;letter-spacing:-.02em;margin-bottom:18px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin-bottom:8px}
.text-input{
  width:100%;padding:13px 15px;border-radius:14px;
  border:1.5px solid var(--line);background:var(--surface-2);
  font-size:15px;outline:none;transition:border-color .2s, background .2s, box-shadow .2s;
}
.text-input:focus{border-color:var(--pine);background:#fff;box-shadow:0 0 0 3px var(--pine-soft)}
.suggest-note{
  display:none;align-items:center;gap:6px;margin-top:8px;
  font-size:12.5px;color:var(--pine);font-weight:500;
  animation:rise .35s var(--ease);
}
.suggest-note.show{display:flex}
.suggest-note svg{width:13px;height:13px}
/* icon grid */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px}
.icon-opt{
  aspect-ratio:1;border-radius:14px;border:1.5px solid var(--line);
  background:var(--surface-2);color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s var(--ease), border-color .2s, background .2s, color .2s;
}
.icon-opt svg{width:20px;height:20px}
.icon-opt:active{transform:scale(.88)}
.icon-opt.sel{background:var(--pine);border-color:var(--pine);color:#fff;animation:pop .4s var(--ease)}
.icon-opt.hinted{border-color:var(--flame);box-shadow:0 0 0 3px var(--flame-soft)}
/* color row */
.color-row{display:flex;gap:9px;flex-wrap:wrap}
/* cover picker */
.cover-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:8px}
.cover-opt{
  height:42px;border-radius:12px;border:1.5px solid var(--line);
  position:relative;overflow:hidden;
  transition:transform .15s var(--ease), box-shadow .2s;
}
.cover-opt:active{transform:scale(.9)}
.cover-opt.sel{box-shadow:0 0 0 2.5px var(--surface), 0 0 0 4.5px var(--ink);animation:pop .35s var(--ease)}
.cover-opt.none-opt{background:var(--surface-2);color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;letter-spacing:.04em}
.color-dot{
  width:34px;height:34px;border-radius:50%;position:relative;
  transition:transform .15s var(--ease);
}
.color-dot:active{transform:scale(.85)}
.color-dot.sel::after{
  content:"";position:absolute;inset:-5px;border-radius:50%;
  border:2px solid var(--ink);animation:pop .35s var(--ease);
}
/* date toggles */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 15px;border:1.5px solid var(--line);border-radius:14px;
  background:var(--surface-2);margin-bottom:10px;
}
.toggle-row .t-label{font-size:14px;font-weight:500}
.toggle-row .t-sub{font-size:11.5px;color:var(--ink-3)}
.switch{position:relative;width:46px;height:27px;flex:0 0 auto}
.switch input{opacity:0;width:100%;height:100%;position:absolute;margin:0;cursor:pointer;z-index:2}
.track{
  position:absolute;inset:0;border-radius:99px;background:var(--line);
  transition:background .25s;
}
.track::after{
  content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);
  transition:transform .3s var(--ease);
}
.switch input:checked + .track{background:var(--pine)}
.switch input:checked + .track::after{transform:translateX(19px)}
.date-input-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s var(--ease)}
.date-input-wrap.open{grid-template-rows:1fr}
.date-input-wrap > div{overflow:hidden}
.date-input{margin-top:2px;margin-bottom:8px}
.primary-btn{
  width:100%;padding:16px;border-radius:16px;margin-top:6px;
  background:var(--ink);color:#fff;font-family:'Sora';font-weight:600;font-size:15px;
  letter-spacing:-.01em;transition:transform .2s var(--ease), opacity .2s;
}
.primary-btn:active{transform:scale(.97)}
.primary-btn:disabled{opacity:.35;cursor:default}

/* toast */
.toast{
  position:fixed;left:50%;bottom:96px;transform:translate(-50%,16px);
  background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;
  padding:11px 18px;border-radius:999px;z-index:70;
  opacity:0;pointer-events:none;transition:opacity .3s, transform .35s var(--ease);
  box-shadow:var(--shadow-lift);white-space:nowrap;
}
.toast.show{opacity:1;transform:translate(-50%,0)}

footer{margin-top:34px;text-align:center;font-size:12px;color:var(--ink-3)}

@media (max-width:420px){
  .pebble{width:32px;height:32px;border-radius:11px}
  .head-title{font-size:26px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s !important;transition-duration:.001s !important}
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="head-row">
      <div>
        <div class="eyebrow" id="todayLabel"></div>
        <h1 class="head-title" id="greeting">Hello</h1>
        <div class="head-sub" id="headSub"></div>
      </div>
      <div class="ring-wrap" id="ringWrap">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle class="ring-bg" cx="42" cy="42" r="36" fill="none" stroke-width="7"/>
          <circle class="ring-fg" id="ringFg" cx="42" cy="42" r="36" fill="none" stroke-width="7"
                  stroke-dasharray="226.2" stroke-dashoffset="226.2"/>
        </svg>
        <div class="ring-label"><b id="ringPct" class="num">0%</b><span>today</span></div>
      </div>
    </div>
  </header>

  <div class="section-label"><h2>Habits</h2><span id="habitCount"></span></div>
  <div id="habitList"></div>

  <div id="insightsWrap">
    <div class="section-label"><h2>Insights</h2><span>all habits</span></div>
    <div class="panel">
      <h3>Last 7 days</h3>
      <div class="hint">Share of habits completed each day</div>
      <div class="bars" id="bars"></div>
    </div>
    <div class="panel">
      <h3>Consistency map</h3>
      <div class="hint">Past 16 weeks of check-ins</div>
      <div class="heat-scroll"><div class="heat" id="heat"></div></div>
      <div class="heat-legend">Less
        <i style="background:var(--surface-2)"></i><i style="background:#CBE3DB"></i>
        <i style="background:#7FB8A6"></i><i style="background:#2F7E6D"></i> More
      </div>
    </div>
  </div>

  <footer>Small steps, kept daily.</footer>
</div>

<button class="fab" id="fabBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New habit</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2 id="sheetTitle">New habit</h2>

  <div class="field">
    <label for="habitName">Name</label>
    <input class="text-input" id="habitName" type="text" placeholder="e.g. Drink water, Read 20 pages…" maxlength="48" autocomplete="off">
    <div class="suggest-note" id="suggestNote">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>
      <span id="suggestText"></span>
    </div>
  </div>

  <div class="field">
    <label>Icon</label>
    <div class="icon-grid" id="iconGrid"></div>
  </div>

  <div class="field">
    <label>Color</label>

/* ============ state & storage ============ */
let state = { habits: [] };
let memOnly = false;

async function load(){
  try{
    const r = await window.storage.get('habit-tracker-v1');
    if(r && r.value) state = JSON.parse(r.value);
  }catch(e){ /* first run or no storage */ }
  if(typeof window.storage === 'undefined') memOnly = true;
}
let saveTimer = null;
function persist(){
  if(memOnly) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await window.storage.set('habit-tracker-v1', JSON.stringify(state)); }
    catch(e){ memOnly = true; }
  }, 250);
}

/* ============ date helpers ============ */
const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function fmt(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function todayKey(){ return fmt(new Date()); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function inRange(h,key){
  if(h.startDate && key < h.startDate) return false;
  if(h.endDate && key > h.endDate) return false;
  return true;
}
function activeToday(h){ return inRange(h, todayKey()); }

/* ============ stats ============ */
function streak(h){
  let s=0;
  let d=new Date();
  if(h.endDate && todayKey() > h.endDate) d = parseKey(h.endDate);
  if(!h.done[fmt(d)]) d = addDays(d,-1);            // today still in progress
  while(true){
    const k = fmt(d);
    if(h.startDate && k < h.startDate) break;
    if(!h.done[k]) break;
    s++; d = addDays(d,-1);
  }
  return s;
}
function bestStreak(h){
  const keys = Object.keys(h.done).filter(k=>h.done[k]).sort();
  let best=0,cur=0,prev=null;
  for(const k of keys){
    if(prev && fmt(addDays(parseKey(prev),1))===k) cur++; else cur=1;
    if(cur>best) best=cur;
    prev=k;
  }
  return best;
}
function totalDone(h){ return Object.values(h.done).filter(Boolean).length; }

/* ============ rendering ============ */
const $ = (s)=>document.querySelector(s);
const openCards = new Set();
const calCursor = {}; // habitId -> Date (month being viewed)

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function prettyDate(k){ return parseKey(k).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

function renderHeader(){
  const now = new Date();
  $('#todayLabel').textContent = now.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  const h = now.getHours();
  $('#greeting').textContent = h<5 ? 'Late night focus' : h<12 ? 'Good morning' : h<18 ? 'Good afternoon' : 'Good evening';

  const active = state.habits.filter(activeToday);
  const done = active.filter(x=>x.done[todayKey()]).length;
  const pct = active.length ? Math.round(done/active.length*100) : 0;
  $('#headSub').textContent = active.length
    ? (done===active.length ? 'Everything done — beautifully kept.' : `${done} of ${active.length} habits done today`)
    : 'Add a habit to begin your streaks';
  $('#ringPct').textContent = pct + '%';
  const C = 226.2;
  requestAnimationFrame(()=>{ $('#ringFg').style.strokeDashoffset = C - (C*pct/100); });
}

function weekStrip(h){
  const t = new Date();
  let cells='';
  for(let i=6;i>=0;i--){
    const d = addDays(t,-i);
    const k = fmt(d);
    const isToday = i===0;
    const done = !!h.done[k];
    const ok = inRange(h,k);
    cells += `<div class="day">
      <span class="day-label ${isToday?'today':''}">${isToday?'Now':DOW[(d.getDay()+6)%7]}</span>
      <button class="pebble ${done?'done':''} ${isToday?'today-pebble':''}"
        ${ok?'':'disabled'}
        ${done?`style="background:${h.color}"`:''}
        data-act="toggle" data-id="${h.id}" data-date="${k}" aria-label="${k}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
    </div>`;
  }
  return `<div class="week">${cells}</div>`;
}

function monthCal(h){
  const cur = calCursor[h.id] || new Date();
  calCursor[h.id] = cur;
  const y=cur.getFullYear(), m=cur.getMonth();
  const first = new Date(y,m,1);
  const startBlank = (first.getDay()+6)%7;
  const daysIn = new Date(y,m+1,0).getDate();
  const tk = todayKey();
  let cells = DOW.map(d=>`<div class="cal-dow">${d[0]}</div>`).join('');
  for(let b=0;b<startBlank;b++) cells += `<button class="cal-cell blank" disabled></button>`;
  for(let day=1;day<=daysIn;day++){
    const k = fmt(new Date(y,m,day));
    const done = !!h.done[k];
    const allowed = inRange(h,k) && k <= tk;
    cells += `<button class="cal-cell ${done?'done':''} ${k===tk?'today-cell':''}"
      ${allowed?'':'disabled'}
      ${done?`style="background:${h.color}"`:''}
      data-act="toggle" data-id="${h.id}" data-date="${k}">${day}</button>`;
  }
  const title = cur.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  return `
    <div class="cal-head">
      <div class="cal-title">${title}</div>
      <div class="cal-nav">
        <button data-act="cal-prev" data-id="${h.id}" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <button data-act="cal-next" data-id="${h.id}" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
    </div>
    <div class="cal-grid">${cells}</div>`;
}

function renderHabits(popInfo){
  const list = $('#habitList');
  $('#habitCount').textContent = state.habits.length ? `${state.habits.length} tracked` : '';
  if(!state.habits.length){
    list.innerHTML = `<div class="empty">
      <div class="orb">${ICONS.sparkles}</div>
      <h3>No habits yet</h3>
      <p>Tap <b>New habit</b> below — name it, pick an icon, and start a streak.</p>
    </div>`;
    $('#insightsWrap').style.display='none';
    return;
  }
  $('#insightsWrap').style.display='';
  list.innerHTML = state.habits.map(h=>{
    const s = streak(h);
    const open = openCards.has(h.id);
    const meta = [];
    if(h.startDate) meta.push(`from ${prettyDate(h.startDate)}`);
    if(h.endDate) meta.push(`until ${prettyDate(h.endDate)}`);
    if(h.endDate && todayKey() > h.endDate) meta.push('• finished');
    return `<div class="card ${open?'open':''} ${h.cover?'has-cover':''}" data-card="${h.id}">
      ${h.cover && COVERS[h.cover] ? `<div class="card-cover" style="background:${COVERS[h.cover]}"></div>` : ''}
      <div class="card-top">
        <div class="chip" style="background:${h.color}">${ICONS[h.icon]||ICONS.target}</div>
        <div class="card-info">
          <div class="card-name">${esc(h.name)}</div>
          ${meta.length?`<div class="card-meta">${meta.join(' ')}</div>`:''}
        </div>
        <div class="streak ${s>0?'':'cold'}" data-streak="${h.id}">${ICONS.flame}<span class="num">${s}</span></div>
        <button class="expander" data-act="expand" data-id="${h.id}" aria-label="Expand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
      ${weekStrip(h)}
      <div class="card-body"><div class="card-body-inner"><div class="body-pad">
        <div class="mini-stats">
          <div class="mini-stat"><b class="num">${s}</b><span>Streak</span></div>
          <div class="mini-stat"><b class="num">${bestStreak(h)}</b><span>Best</span></div>
          <div class="mini-stat"><b class="num">${totalDone(h)}</b><span>Total</span></div>
        </div>
        ${monthCal(h)}
        <div class="divider"></div>
        <div class="card-actions">
          <button class="ghost-btn" data-act="edit" data-id="${h.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            Edit</button>
          <button class="ghost-btn danger" data-act="delete" data-id="${h.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            Delete</button>
        </div>
      </div></div></div>
    </div>`;
  }).join('');

  /* pop animation on the pebble that was just toggled on */
  if(popInfo){
    const el = list.querySelector(`.pebble.done[data-id="${popInfo.id}"][data-date="${popInfo.date}"]`);
    if(el) el.classList.add('pop');
    if(popInfo.streakUp){
      const st = list.querySelector(`[data-streak="${popInfo.id}"]`);
      if(st) st.classList.add('lit');
    }
  }
}

function renderInsights(){
  if(!state.habits.length) return;
  /* 7-day bars */
  const t = new Date();
  let bars='';
  for(let i=6;i>=0;i--){
    const d = addDays(t,-i);
    const k = fmt(d);
    const active = state.habits.filter(h=>inRange(h,k));
    const done = active.filter(h=>h.done[k]).length;
    const pct = active.length ? done/active.length : 0;
    bars += `<div class="bar-col">
      <div class="bar-track"><div class="bar-fill ${pct===0?'faint':''}" style="height:${Math.max(pct*100,6)}%"></div></div>
      <span class="bar-day ${i===0?'today':''}">${i===0?'Now':DOW[(d.getDay()+6)%7]}</span>
    </div>`;
  }
  $('#bars').innerHTML = bars;

  /* heatmap: 16 weeks, columns of 7 ending today */
  const totalDays = 16*7;
  const end = new Date();
  const endDow = (end.getDay()+6)%7; // 0=Mon
  let cells='';
  const start = addDays(end, -(totalDays - (6-endDow) - 1));
  for(let i=0;i<totalDays;i++){
    const d = addDays(start,i);
    const k = fmt(d);
    if(d > end){ cells += `<i style="opacity:0"></i>`; continue; }
    const active = state.habits.filter(h=>inRange(h,k));
    const done = active.filter(h=>h.done[k]).length;
    const r = active.length ? done/active.length : 0;
    let c = 'var(--surface-2)';
    if(r>0 && r<=.34) c='#CBE3DB';
    else if(r<=.67 && r>0) c='#7FB8A6';
    else if(r>0) c='#2F7E6D';
    cells += `<i style="background:${c};animation-delay:${(i%28)*12}ms" title="${k}: ${done}/${active.length||0}"></i>`;
  }
  $('#heat').innerHTML = cells;
  const hs = $('.heat-scroll'); hs.scrollLeft = hs.scrollWidth;
}

function renderAll(popInfo){
  renderHeader();
  renderHabits(popInfo);
  renderInsights();
}

/* ============ interactions ============ */
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-act]');
  if(!btn) return;
  const act = btn.dataset.act, id = btn.dataset.id;
  const h = state.habits.find(x=>x.id===id);

  if(act==='toggle' && h){
    const k = btn.dataset.date;
    const before = streak(h);
    h.done[k] = !h.done[k];
    if(!h.done[k]) delete h.done[k];
    persist();
    const after = streak(h);
    renderAll(h.done[k] ? {id, date:k, streakUp: after>before} : null);
    if(h.done[k] && k===todayKey() && after>0 && after%7===0) toast(`🔥 ${after}-day streak on ${h.name}!`);
  }
  if(act==='expand'){
    openCards.has(id) ? openCards.delete(id) : openCards.add(id);
    document.querySelector(`[data-card="${id}"]`)?.classList.toggle('open');
    /* re-render lazily isn't needed; calendar already in DOM */
  }
  if(act==='cal-prev' || act==='cal-next'){
    const cur = calCursor[id] || new Date();
    calCursor[id] = new Date(cur.getFullYear(), cur.getMonth() + (act==='cal-next'?1:-1), 1);
    renderAll();
  }
  if(act==='edit' && h) openSheet(h);
  if(act==='delete' && h){
    if(confirm(`Delete “${h.name}” and its history?`)){
      state.habits = state.habits.filter(x=>x.id!==id);
      openCards.delete(id);
      persist(); renderAll();
      toast('Habit deleted');
    }
  }
});

/* ============ sheet (add / edit) ============ */
const sheet=$('#sheet'), scrim=$('#scrim');
let editingId=null, selIcon='target', selColor=COLORS[0], selCover=null;
let iconTouched=false, colorTouched=false, coverTouched=false;

function buildPickers(){
  $('#iconGrid').innerHTML = ICON_KEYS.filter(k=>k!=='flame').map(k=>
    `<button class="icon-opt" data-icon="${k}" aria-label="${k}">${ICONS[k]}</button>`).join('');
  $('#colorRow').innerHTML = COLORS.map(c=>
    `<button class="color-dot" data-color="${c}" style="background:${c}" aria-label="${c}"></button>`).join('');
  $('#coverRow').innerHTML = `<button class="cover-opt none-opt" data-cover="" aria-label="No cover">None</button>` +
    COVER_KEYS.map(k=>`<button class="cover-opt" data-cover="${k}" style="background:${COVERS[k]}" aria-label="${k}"></button>`).join('');
}
function syncPickers(hint){
  document.querySelectorAll('.icon-opt').forEach(b=>{
    b.classList.toggle('sel', b.dataset.icon===selIcon);
    b.classList.toggle('hinted', hint && b.dataset.icon===hint && hint!==selIcon);
  });
  document.querySelectorAll('.color-dot').forEach(b=>
    b.classList.toggle('sel', b.dataset.color===selColor));
  document.querySelectorAll('.cover-opt').forEach(b=>
    b.classList.toggle('sel', (b.dataset.cover||null)===selCover));
}
function openSheet(h){
  editingId = h ? h.id : null;
  $('#sheetTitle').textContent = h ? 'Edit habit' : 'New habit';
  $('#saveBtn').textContent = h ? 'Save changes' : 'Add habit';
  $('#habitName').value = h ? h.name : '';
  selIcon = h ? h.icon : 'target';
  selColor = h ? h.color : COLORS[Math.floor(Math.random()*COLORS.length)];
  selCover = h ? (h.cover||null) : null;
  iconTouched = colorTouched = coverTouched = !!h;
  $('#startToggle').checked = !!(h && h.startDate);
  $('#endToggle').checked = !!(h && h.endDate);
  $('#startDate').value = h && h.startDate ? h.startDate : todayKey();
  $('#endDate').value = h && h.endDate ? h.endDate : '';
  $('#startWrap').classList.toggle('open', $('#startToggle').checked);
  $('#endWrap').classList.toggle('open', $('#endToggle').checked);
  $('#suggestNote').classList.remove('show');
  syncPickers(null);
  validate();
  scrim.classList.add('show');
  sheet.classList.add('show');
  setTimeout(()=>{ if(!h) $('#habitName').focus(); }, 350);
}
function closeSheet(){ scrim.classList.remove('show'); sheet.classList.remove('show'); }
function validate(){ $('#saveBtn').disabled = !$('#habitName').value.trim(); }

$('#fabBtn').addEventListener('click', ()=>openSheet(null));
scrim.addEventListener('click', closeSheet);

$('#habitName').addEventListener('input', (e)=>{
  validate();
  const hint = suggestIcon(e.target.value);
  if(hint){
    const theme = THEMES[hint];
    const applied = [];
    if(!iconTouched){ selIcon = hint; applied.push('icon'); }
    if(theme && !colorTouched){ selColor = theme.color; applied.push('color'); }
    if(theme && !coverTouched){ selCover = theme.cover; applied.push('cover'); }
    if(applied.length){
      const list = applied.length===1 ? applied[0] : applied.slice(0,-1).join(', ')+' & '+applied.at(-1);
      $('#suggestText').textContent = `Matched ${list} to “${e.target.value.trim()}”`;
      $('#suggestNote').classList.add('show');
      syncPickers(selIcon===hint ? null : hint);
    } else {
      $('#suggestText').textContent = 'Suggested icon highlighted below';
      $('#suggestNote').classList.add('show');
      syncPickers(hint);
    }
  } else {
    $('#suggestNote').classList.remove('show');
    syncPickers(null);
  }
});
$('#iconGrid').addEventListener('click',(e)=>{
  const b = e.target.closest('.icon-opt'); if(!b) return;
  selIcon = b.dataset.icon; iconTouched = true;
  const theme = THEMES[selIcon];
  if(theme && !colorTouched) selColor = theme.color;
  if(theme && !coverTouched) selCover = theme.cover;
  $('#suggestNote').classList.remove('show');
  syncPickers(null);
});
$('#colorRow').addEventListener('click',(e)=>{
  const b = e.target.closest('.color-dot'); if(!b) return;
  selColor = b.dataset.color; colorTouched = true; syncPickers(null);
});
$('#coverRow').addEventListener('click',(e)=>{
  const b = e.target.closest('.cover-opt'); if(!b) return;
  selCover = b.dataset.cover || null; coverTouched = true; syncPickers(null);
});
$('#startToggle').addEventListener('change',(e)=>$('#startWrap').classList.toggle('open', e.target.checked));
$('#endToggle').addEventListener('change',(e)=>$('#endWrap').classList.toggle('open', e.target.checked));

$('#saveBtn').addEventListener('click', ()=>{
  const name = $('#habitName').value.trim();
  if(!name) return;
  const startDate = $('#startToggle').checked && $('#startDate').value ? $('#startDate').value : null;
  let endDate = $('#endToggle').checked && $('#endDate').value ? $('#endDate').value : null;
  if(startDate && endDate && endDate < startDate){ toast('End date must be after start date'); return; }
  if(editingId){
    const h = state.habits.find(x=>x.id===editingId);
    Object.assign(h,{name, icon:selIcon, color:selColor, cover:selCover, startDate, endDate});
    toast('Habit updated');
  } else {
    state.habits.push({
      id:'h'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      name, icon:selIcon, color:selColor, cover:selCover, startDate, endDate,
      created:todayKey(), done:{}
    });
    toast('Habit added — tap a day to check it off');
  }
  persist(); closeSheet(); renderAll();
});

/* toast */
let toastTimer=null;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ============ boot ============ */
buildPickers();
load().then(()=>{ renderAll(); });
</script>
</body>
</html>
