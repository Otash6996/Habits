<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F5F4EF" />
<title>Streak — Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F4EF; --card:#FFFFFF; --ink:#19181C; --sub:#8C8A93; --faint:#B9B7BE;
    --line:#ECEAE3; --track:#E9E7E0; --ringA:#FFB46B; --ringB:#FF6F91; --accent:#FF6F91; --flame:#F5860B;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;}
  .display{font-family:'Space Grotesk',sans-serif;}
  button,input{font-family:inherit;}
  svg{vertical-align:middle;}

  .wrap{position:relative;width:100%;max-width:460px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fade .38s ease both;}
  .screen{padding:26px 18px 14px;}
  @media (min-width:480px){
    body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;}
    .wrap{height:min(880px,calc(100dvh - 48px));border:1px solid var(--line);border-radius:30px;box-shadow:0 30px 70px rgba(20,18,22,.14);}
  }

  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .anim-in{animation:rise .5s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .pop{animation:pop .42s cubic-bezier(.3,1.5,.5,1) both;}
  @keyframes pop{0%{transform:scale(.5);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
  .spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--track);border-top-color:var(--accent);animation:rot .8s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}

  h1.title{font-size:26px;font-weight:700;margin:0;}
  .datenav{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 4px;}
  .navbtn{width:34px;height:34px;border-radius:11px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;cursor:pointer;transition:transform .12s;color:var(--ink);}
  .navbtn:active{transform:scale(.9);}
  .navbtn:disabled{opacity:.3;cursor:default;}

  .ringcard{display:grid;place-items:center;padding:22px 0 10px;}
  .ringwrap{position:relative;width:168px;height:168px;}
  .ringtext{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ringnum{font-size:40px;font-weight:700;line-height:1;}
  .ringlbl{font-size:12.5px;color:var(--sub);margin-top:6px;letter-spacing:.04em;}

  .list{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px 15px;transition:background .25s,border-color .25s,transform .12s;}
  button.row{cursor:pointer;}
  button.row:active{transform:scale(.985);}
  .checkdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--track);display:grid;place-items:center;flex-shrink:0;transition:background .2s,border-color .2s;}
  .ctrl{position:relative;width:32px;height:32px;flex-shrink:0;display:grid;place-items:center;}
  .ctrlnum{position:relative;font-size:10px;font-weight:700;color:var(--accent);}
  .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);flex-shrink:0;}
  .hname{font-size:15.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hsub{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .streak{display:flex;align-items:center;gap:3px;color:var(--flame);font-size:13px;font-weight:700;flex-shrink:0;}

  .addbtn{display:inline-flex;align-items:center;gap:5px;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .12s;}
  .addbtn:active{transform:scale(.95);}
  .iconbtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;cursor:pointer;flex-shrink:0;transition:transform .12s;color:var(--sub);}
  .iconbtn:active{transform:scale(.9);}
  .grip{width:30px;height:38px;border:none;background:none;display:grid;place-items:center;cursor:grab;color:var(--faint);flex-shrink:0;touch-action:none;margin-left:-6px;padding:0;}
  .grip:active{cursor:grabbing;}
  .tag{font-size:10.5px;font-weight:700;color:var(--sub);background:var(--track);padding:1px 7px;border-radius:6px;}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:12px;}
  .statval{font-size:25px;font-weight:700;line-height:1;}
  .statsuf{font-size:15px;color:var(--sub);}
  .statlbl{font-size:12.5px;color:var(--sub);margin-top:5px;}

  .bars{display:flex;align-items:flex-end;gap:8px;height:130px;}
  .barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;}
  .bar{width:26px;border-radius:7px;background:var(--track);transition:height .7s cubic-bezier(.2,.8,.25,1);}
  .barday{font-size:12px;color:var(--sub);}

  .heat{display:flex;gap:3px;}
  .heatcol{display:flex;flex-direction:column;gap:3px;}
  .heatcell{width:12px;height:12px;border-radius:3.5px;}
  .scroll-x{overflow-x:auto;padding-bottom:2px;}

  .mini{text-align:right;}
  .miniv{font-size:17px;font-weight:700;}
  .minil{font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;}

  .empty{text-align:center;padding:54px 24px;color:var(--sub);}
  .emptyicon{width:56px;height:56px;border-radius:16px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 14px;color:var(--faint);}
  .emptytitle{font-size:15.5px;font-weight:700;color:var(--ink);}
  .emptytext{font-size:13.5px;margin-top:5px;max-width:240px;margin-inline:auto;}

  .tabbar{flex-shrink:0;display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 12px calc(8px + env(safe-area-inset-bottom));z-index:20;}
  .tab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;color:var(--faint);transition:color .2s;}
  .tab.on{color:var(--ink);}
  .tabicon{width:46px;height:30px;border-radius:14px;display:grid;place-items:center;transition:background .25s;}
  .tablbl{font-size:11px;font-weight:600;}
  .tab.on .tablbl{font-weight:700;}

  .toaststack{position:absolute;left:0;right:0;bottom:78px;display:flex;flex-direction:column;gap:8px;padding:0 14px;z-index:40;pointer-events:none;}
  .toast{pointer-events:auto;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;box-shadow:0 12px 30px rgba(20,18,22,.16);padding:12px 12px 12px 14px;display:flex;align-items:center;gap:10px;animation:toastin .32s cubic-bezier(.2,.9,.3,1) both;}
  @keyframes toastin{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  .toasttitle{font-size:14px;font-weight:700;color:var(--ink);}
  .toastsub{font-size:12px;color:var(--sub);margin-top:1px;}
  .toastdone{border:none;background:var(--accent);color:#fff;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
  .toastx{border:none;background:none;color:var(--sub);cursor:pointer;flex-shrink:0;display:grid;place-items:center;padding:4px;}

  .confirmbox{background:var(--card);width:100%;max-width:360px;border-radius:22px;padding:22px 20px;animation:up .3s cubic-bezier(.2,.8,.25,1) both;box-shadow:0 20px 50px rgba(20,18,22,.2);}
  .confirmtitle{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .confirmtext{font-size:13.5px;color:var(--sub);line-height:1.45;margin-bottom:18px;}
  .confirmrow{display:flex;gap:10px;}
  .btn-ghost{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:13px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;}
  .btn-danger{flex:1;background:#E0413E;border:none;color:#fff;border-radius:13px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;}
  .timerow{display:flex;gap:12px;margin-bottom:16px;}

  .backdrop{position:fixed;inset:0;background:rgba(20,18,22,.42);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:bd .25s ease both;}
  @keyframes bd{from{opacity:0;}to{opacity:1;}}
  .sheet{background:var(--bg);width:100%;max-width:460px;border-radius:26px 26px 0 0;padding:22px 20px calc(26px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:up .36s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes up{from{transform:translateY(100%);}to{transform:none;}}
  .sheethead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .sheettitle{font-size:20px;font-weight:700;}
  .lbl{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:0 0 8px;}
  .field{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;font-size:15px;color:var(--ink);margin-bottom:18px;outline:none;transition:border-color .2s;}
  .field:focus{border-color:var(--ink);}
  .stepper{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:8px;}
  .stepbtn{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--bg);display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:transform .12s;}
  .stepbtn:active{transform:scale(.92);}
  .stepbtn:disabled{opacity:.35;cursor:default;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .chip:active{transform:scale(.94);}
  .chipon{background:var(--accent);border-color:var(--accent);color:#fff;}
  .plainbtn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;display:grid;place-items:center;}
  .qstep{display:flex;gap:6px;flex-shrink:0;}
  .qbtn{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:transform .12s;}
  .qbtn:active{transform:scale(.9);}
  .qbtn:disabled{opacity:.35;cursor:default;}
  .goalnum{font-size:26px;font-weight:700;line-height:1;}
  .goalsub{font-size:11.5px;color:var(--sub);margin-top:3px;}
  .goalhelp{font-size:12px;color:var(--sub);margin:0 0 18px;}
  .seg{display:flex;background:var(--track);border-radius:13px;padding:3px;}
  .seg button{flex:1;border:none;border-radius:10px;padding:9px;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:var(--sub);}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .days{display:flex;gap:6px;margin-bottom:18px;}
  .day{flex:1;height:38px;border-radius:10px;font-size:13px;font-weight:700;background:var(--bg);color:var(--sub);border:1px solid var(--line);cursor:pointer;transition:all .15s;}
  .daterow{display:flex;gap:12px;margin-bottom:16px;}
  .datecol{flex:1;}
  .endtoggle{font-size:11.5px;font-weight:700;background:none;border:none;cursor:pointer;padding:0;}
  .err{color:#E0413E;font-size:13px;margin-bottom:12px;}
  .primary{width:100%;background:var(--ink);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15.5px;font-weight:700;cursor:pointer;transition:transform .12s;}
  .primary:active{transform:scale(.98);}
  input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;}

  @media (prefers-reduced-motion: reduce){
    *,main,.anim-in,.pop,.sheet,.backdrop,.spin,.bar,.ringfg{animation:none !important;transition:none !important;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <main id="app"><div style="display:grid;place-items:center;height:80vh;"><div class="spin"></div></div></main>
    <div class="toaststack" id="toaststack"></div>
    <nav class="tabbar" id="tabbar"></nav>
  </div>

<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
/* ============================== date utils =============================== */
function pad(n){return (n<10?"0":"")+n;}
function fmtKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function parseKey(k){var p=k.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function startOfWeek(d){return addDays(d,-d.getDay());}
var WEEK=["S","M","T","W","T","F","S"];
var DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function easeOut(p){return 1-Math.pow(1-p,3);}
function reduced(){return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;}
function relativeLabel(key){
  var t=fmtKey(new Date()),y=fmtKey(addDays(new Date(),-1)),tm=fmtKey(addDays(new Date(),1));
  if(key===t)return "Today"; if(key===y)return "Yesterday"; if(key===tm)return "Tomorrow";
  return parseKey(key).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
}

/* ============================ habit + progress =========================== */
function goalOf(h){return Math.max(1,h.goal||1);}
function habitType(h){return h.type||(goalOf(h)>1?"count":"binary");}
function isCount(h){return habitType(h)==="count";}
function toMin(t){ var p=(t||"0:0").split(":"); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
function fmtTime(t){ var p=(t||"0:0").split(":"),h=parseInt(p[0],10)||0,m=parseInt(p[1],10)||0,ap=h<12?"AM":"PM",hh=h%12; if(hh===0)hh=12; return hh+":"+(m<10?"0":"")+m+" "+ap; }
var UNIT_PRESETS=["times","sets","reps","pages","cups","glasses","minutes","hours","km","steps"];
var UNIT_SINGULAR={times:"time",sets:"set",reps:"rep",pages:"page",cups:"cup",glasses:"glass",minutes:"minute",hours:"hour",km:"km",steps:"step",miles:"mile",laps:"lap",chapters:"chapter",liters:"liter",pomodoros:"pomodoro"};
function unitLabel(n,unit){
  unit=(unit||"times").trim();
  if(n===1){
    var k=unit.toLowerCase();
    if(UNIT_SINGULAR[k])return UNIT_SINGULAR[k];
    if(unit.length>2 && unit.charAt(unit.length-1)==="s")return unit.slice(0,-1);
  }
  return unit;
}
function isScheduled(h,key){
  if(key<h.startDate)return false;
  if(h.endDate && key>h.endDate)return false;
  if(h.freq==="daily")return true;
  return (h.days||[]).indexOf(parseKey(key).getDay())>=0;
}
function prog(h,key){
  var v=state.completions[h.id] && state.completions[h.id][key];
  if(v===true)return goalOf(h);
  return Math.min(goalOf(h), v||0);
}
function isFull(h,key){return prog(h,key)>=goalOf(h);}
function frac(h,key){return Math.min(1, prog(h,key)/goalOf(h));}

function currentStreak(h,refKey){
  var streak=0,d=parseKey(refKey),today=fmtKey(new Date());
  for(var i=0;i<800;i++){
    var k=fmtKey(d); if(k<h.startDate)break;
    if(isScheduled(h,k)){ if(isFull(h,k))streak++; else if(k===today){} else break; }
    d=addDays(d,-1);
  }
  return streak;
}
function bestStreak(h){
  var best=0,run=0,d=parseKey(h.startDate),end=new Date();
  for(var i=0;i<1000 && d<=end;i++){
    var k=fmtKey(d);
    if(isScheduled(h,k)){ if(isFull(h,k)){run++;best=Math.max(best,run);} else run=0; }
    d=addDays(d,1);
  }
  return best;
}
function ratePct(h,days){
  days=days||30; var sum=0,total=0,d=addDays(new Date(),-(days-1));
  for(var i=0;i<days;i++){ var k=fmtKey(d); if(isScheduled(h,k)){total++;sum+=frac(h,k);} d=addDays(d,1); }
  return total?Math.round(sum/total*100):0;
}
function hexA(hex,a){var h=hex.replace("#","");return "rgba("+parseInt(h.slice(0,2),16)+","+parseInt(h.slice(2,4),16)+","+parseInt(h.slice(4,6),16)+","+a+")";}
function scheduleLabel(h){
  if(h.freq==="daily")return "Every day";
  if(!h.days||!h.days.length)return "No days set";
  if(h.days.length===7)return "Every day";
  if(JSON.stringify(h.days)===JSON.stringify([1,2,3,4,5]))return "Weekdays";
  if(JSON.stringify(h.days)===JSON.stringify([0,6]))return "Weekends";
  return h.days.map(function(d){return DOW[d];}).join(" · ");
}
function dateRangeLabel(h){
  var s=parseKey(h.startDate).toLocaleDateString(undefined,{month:"short",day:"numeric"});
  if(!h.endDate)return "from "+s;
  return s+" – "+parseKey(h.endDate).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
var ACCENT="#FF6F91";
function ic(name,size,color){return '<i data-lucide="'+name+'" style="width:'+size+'px;height:'+size+'px;color:'+(color||"currentColor")+'"></i>';}

/* ================================ storage ================================ */
var KEY="streak_habit_tracker_v1";
function load(){ try{ var raw=localStorage.getItem(KEY); if(raw){var d=JSON.parse(raw); if(d&&d.habits)return d;} }catch(e){} return null; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify({habits:state.habits,completions:state.completions,reminded:state.reminded})); }catch(e){} }

function seed(){
  var start=fmtKey(addDays(new Date(),-34));
  var habits=[
    {id:"h1",name:"Drink water",type:"count",goal:8,unit:"cups",freq:"daily",days:[],startDate:start,endDate:null,remind:{on:false,from:"09:00",to:"21:00"}},
    {id:"h2",name:"Read",type:"count",goal:20,unit:"pages",freq:"daily",days:[],startDate:start,endDate:null,remind:{on:true,from:"20:00",to:"22:00"}},
    {id:"h3",name:"Morning run",type:"binary",goal:1,unit:"times",freq:"weekly",days:[1,3,5],startDate:start,endDate:null,remind:{on:false,from:"06:00",to:"09:00"}},
    {id:"h4",name:"Meditate",type:"binary",goal:1,unit:"times",freq:"daily",days:[],startDate:start,endDate:null,remind:{on:false,from:"07:00",to:"08:00"}}
  ];
  var comps={};
  habits.forEach(function(h){
    comps[h.id]={}; var d=addDays(new Date(),-33);
    for(var i=0;i<34;i++){
      var k=fmtKey(d);
      if(scheduledRaw(h,k)){
        var recent=i>28;
        if(goalOf(h)>1){ var n=recent?goalOf(h):Math.round(Math.random()*goalOf(h)); if(n>0)comps[h.id][k]=n; }
        else if(recent||Math.random()<0.72) comps[h.id][k]=1;
      }
      d=addDays(d,1);
    }
  });
  return {habits:habits,completions:comps};
}
function scheduledRaw(h,key){
  if(key<h.startDate)return false;
  if(h.endDate && key>h.endDate)return false;
  if(h.freq==="daily")return true;
  return (h.days||[]).indexOf(parseKey(key).getDay())>=0;
}

/* ================================= state ================================= */
var state={tab:"today", selDate:fmtKey(new Date()), habits:[], completions:{}, reminded:{}, toasts:[]};

/* =============================== render app ============================== */
function render(){
  var app=document.getElementById("app");
  if(state.tab==="today")app.innerHTML=renderToday();
  else if(state.tab==="habits")app.innerHTML=renderHabits();
  else app.innerHTML=renderStats();
  app.style.animation="none"; void app.offsetWidth; app.style.animation="fade .38s ease both";
  renderTabs();
  if(window.lucide)lucide.createIcons();
  postRender();
  renderToasts();
}
function renderToasts(){
  var el=document.getElementById("toaststack"); if(!el)return;
  el.innerHTML=state.toasts.map(function(t){
    return '<div class="toast">'+
      ic("bell",18,"var(--accent)")+
      '<div style="flex:1;min-width:0;"><div class="toasttitle">'+esc(t.name)+'</div>'+
      '<div class="toastsub">Still unfinished — '+fmtTime(t.from)+'–'+fmtTime(t.to)+' window passed</div></div>'+
      '<button class="toastdone" data-tdone="'+t.uid+'">Done</button>'+
      '<button class="toastx" data-tx="'+t.uid+'" aria-label="Dismiss">'+ic("x",16,"#8C8A93")+'</button>'+
    '</div>';
  }).join("");
  if(window.lucide)lucide.createIcons();
}
function checkReminders(){
  var now=new Date(), today=fmtKey(now), nowMin=now.getHours()*60+now.getMinutes(), changed=false;
  state.habits.forEach(function(h){
    if(!h.remind || !h.remind.on)return;
    if(!isScheduled(h,today))return;
    if(state.reminded[h.id+":"+today])return;
    if(isFull(h,today))return;
    if(nowMin < toMin(h.remind.to))return;
    if(state.toasts.some(function(t){return t.habitId===h.id && t.date===today;}))return;
    state.toasts.push({uid:"t"+Date.now().toString(36)+Math.random().toString(36).slice(2,5),habitId:h.id,date:today,name:h.name,from:h.remind.from,to:h.remind.to});
    changed=true;
  });
  if(changed)renderToasts();
}
function renderTabs(){
  var tabs=[["today","sun","Today"],["habits","list-checks","Habits"],["stats","trending-up","Progress"]];
  document.getElementById("tabbar").innerHTML=tabs.map(function(t){
    var on=state.tab===t[0];
    return '<button class="tab '+(on?"on":"")+'" data-tab="'+t[0]+'">'+
      '<span class="tabicon" style="background:'+(on?hexA(ACCENT,0.13):"transparent")+'">'+ic(t[1],20,on?ACCENT:"#B9B7BE")+'</span>'+
      '<span class="tablbl">'+t[2]+'</span></button>';
  }).join("");
}

/* --------------------------------- TODAY -------------------------------- */
function renderToday(){
  var key=state.selDate;
  var todays=state.habits.filter(function(h){return isScheduled(h,key);});
  var fullDone=todays.filter(function(h){return isFull(h,key);}).length;
  var f=todays.length?todays.reduce(function(s,h){return s+frac(h,key);},0)/todays.length:0;
  var isFuture=key>=fmtKey(addDays(new Date(),1));
  var hour=new Date().getHours();
  var greet=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  var notToday=key!==fmtKey(new Date());

  var rows = todays.length===0
    ? emptyHTML("sun","Nothing scheduled","No habits land on this day. Add one from the Habits tab.")
    : '<div class="list">'+todays.map(function(h,i){return todayRow(h,key,i);}).join("")+'</div>';

  return '<div class="screen">'+
    '<div class="anim-in"><div style="font-size:13.5px;color:var(--sub);font-weight:600;">'+greet+'</div>'+
    '<h1 class="title display" style="margin-top:2px;">'+relativeLabel(key)+'</h1></div>'+
    '<div class="datenav anim-in" style="animation-delay:60ms;">'+
      '<button class="navbtn" data-datenav="-1">'+ic("chevron-left",18,"#19181C")+'</button>'+
      '<span style="font-size:13.5px;color:var(--sub);">'+parseKey(key).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})+'</span>'+
      '<button class="navbtn" data-datenav="1" '+(isFuture?"disabled":"")+'>'+ic("chevron-right",18,"#19181C")+'</button>'+
    '</div>'+
    '<div class="ringcard anim-in" style="animation-delay:110ms;">'+ringHTML(f,todays.length)+'</div>'+
    (todays.length>0?'<div style="text-align:center;font-size:12.5px;color:var(--sub);margin-bottom:14px;">'+fullDone+' of '+todays.length+' habits complete</div>':'')+
    (notToday?'<div style="font-size:12.5px;color:var(--sub);text-align:center;margin-bottom:10px;">Viewing a past day — tap to fill in what you completed.</div>':'')+
    rows+'</div>';
}
function ringHTML(f,total){
  var size=168,sw=14,r=(size-sw)/2,c=2*Math.PI*r,off=c*(1-f);
  var lbl=total===0?"no habits today":(f>=1?"all done":"complete");
  return '<div class="ringwrap"><svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);">'+
    '<defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="var(--ringA)"/><stop offset="100%" stop-color="var(--ringB)"/></linearGradient></defs>'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" stroke="var(--track)" stroke-width="'+sw+'" fill="none"/>'+
    '<circle class="ringfg" cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" stroke="url(#rg)" stroke-width="'+sw+'" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+c+'" data-off="'+off+'" style="transition:stroke-dashoffset .9s cubic-bezier(.34,1.4,.5,1);"/>'+
    '</svg><div class="ringtext"><div class="ringnum display" data-count="'+(total?Math.round(f*100):0)+'" data-pct="1">'+(total===0?"—":"0%")+'</div>'+
    '<div class="ringlbl">'+lbl+'</div></div></div>';
}
function controlHTML(done,goal){
  var full=done>=goal;
  if(goal<=1){
    return '<span class="checkdot '+(full?"pop":"")+'" style="background:'+(full?ACCENT:"transparent")+';border-color:'+(full?ACCENT:"var(--track)")+';">'+(full?ic("check",17,"#fff"):"")+'</span>';
  }
  var size=32,sw=3.5,r=(size-sw)/2,c=2*Math.PI*r,f=Math.min(1,done/goal),off=c*(1-f);
  return '<span class="ctrl"><svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);position:absolute;inset:0;">'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" stroke="var(--track)" stroke-width="'+sw+'" fill="'+(full?ACCENT:"none")+'"/>'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" stroke="'+ACCENT+'" stroke-width="'+sw+'" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .4s ease;"/></svg>'+
    (full?ic("check",15,"#fff"):'<span class="ctrlnum display">'+done+'/'+goal+'</span>')+'</span>';
}
function todayRow(h,key,i){
  var g=goalOf(h),done=prog(h,key),full=done>=g,count=isCount(h),streak=currentStreak(h,key);
  var bg=full?hexA(ACCENT,0.10):done>0?hexA(ACCENT,0.05):"var(--card)";
  var bd=full?hexA(ACCENT,0.38):done>0?hexA(ACCENT,0.22):"var(--line)";
  var nameStyle='display:block;'+(full?"text-decoration:line-through;text-decoration-color:"+hexA(ACCENT,0.6)+";opacity:.62;":"");
  var flame=streak>0?'<span class="streak display" style="font-size:'+(count?12:13)+'px;">'+ic("flame",count?11:14,"var(--flame)")+' '+streak+'</span>':'';
  if(!count){
    return '<button class="row anim-in" style="animation-delay:'+(i*55)+'ms;background:'+bg+';border-color:'+bd+';" data-toggle="'+h.id+'">'+
      controlHTML(done,g)+
      '<span style="flex:1;min-width:0;"><span class="hname" style="'+nameStyle+'">'+esc(h.name)+'</span>'+
      '<span class="hsub" style="display:block;">'+scheduleLabel(h)+'</span></span>'+flame+'</button>';
  }
  return '<div class="row anim-in" style="animation-delay:'+(i*55)+'ms;background:'+bg+';border-color:'+bd+';">'+
    '<button class="plainbtn" data-quick="'+h.id+'" aria-label="Toggle complete">'+controlHTML(done,g)+'</button>'+
    '<span style="flex:1;min-width:0;"><span class="hname" style="'+nameStyle+'">'+esc(h.name)+'</span>'+
    '<span class="hsub" style="display:flex;align-items:center;gap:7px;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+done+'/'+g+' '+unitLabel(g,h.unit)+'</span>'+flame+'</span></span>'+
    '<div class="qstep"><button class="qbtn" data-dec="'+h.id+'"'+(done<=0?' disabled':'')+'>'+ic("minus",15)+'</button>'+
    '<button class="qbtn" data-inc="'+h.id+'"'+(done>=g?' disabled':'')+'>'+ic("plus",15)+'</button></div></div>';
}

/* --------------------------------- HABITS ------------------------------- */
function renderHabits(){
  var inner;
  if(state.habits.length===0){
    inner=emptyHTML("list-checks","No habits yet","Create your first habit and start a streak.");
  }else{
    var hint=state.habits.length>1?'<div style="font-size:12px;color:var(--sub);margin:16px 0 -6px;">Drag the handle to reorder.</div>':'';
    inner=hint+'<div class="list" id="habitlist" style="margin-top:16px;">'+state.habits.map(function(h,i){
      var ended=h.endDate && fmtKey(new Date())>h.endDate, g=goalOf(h);
      return '<div class="row anim-in" style="animation-delay:'+(i*55)+'ms;">'+
        '<button class="grip" data-grip aria-label="Drag to reorder">'+ic("grip-vertical",18,"#B9B7BE")+'</button>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:15.5px;font-weight:600;display:flex;gap:7px;align-items:center;"><span class="hname">'+esc(h.name)+'</span>'+
            (isCount(h)?'<span class="tag">'+g+' '+unitLabel(g,h.unit)+' / day</span>':'')+(h.remind&&h.remind.on?'<span class="tag" style="display:inline-flex;align-items:center;gap:3px;">'+ic("bell",11,"var(--sub)")+fmtTime(h.remind.from)+'–'+fmtTime(h.remind.to)+'</span>':'')+(ended?'<span class="tag">ended</span>':'')+'</div>'+
          '<div class="hsub">'+scheduleLabel(h)+' · '+dateRangeLabel(h)+'</div>'+
        '</div>'+
        '<button class="iconbtn" data-edit="'+h.id+'">'+ic("pencil",16,"#8C8A93")+'</button>'+
        '<button class="iconbtn" data-del="'+h.id+'">'+ic("trash-2",16,"#8C8A93")+'</button>'+
      '</div>';
    }).join("")+'</div>';
  }
  return '<div class="screen"><div class="anim-in" style="display:flex;align-items:center;justify-content:space-between;">'+
    '<h1 class="title display">Habits</h1><button class="addbtn" data-add="1">'+ic("plus",18)+' New</button></div>'+inner+'</div>';
}

/* --------------------------------- STATS -------------------------------- */
function renderStats(){
  var todayKey=fmtKey(new Date());
  var bars=[];
  for(var i=6;i>=0;i--){
    var d=addDays(new Date(),-i),k=fmtKey(d);
    var sched=state.habits.filter(function(h){return isScheduled(h,k);});
    var avg=sched.length?sched.reduce(function(s,h){return s+frac(h,k);},0)/sched.length:0;
    bars.push({day:WEEK[d.getDay()],pct:Math.round(avg*100)});
  }
  var best=state.habits.reduce(function(m,h){return Math.max(m,bestStreak(h));},0);
  var todaySched=state.habits.filter(function(h){return isScheduled(h,todayKey);});
  var todayDone=todaySched.filter(function(h){return isFull(h,todayKey);}).length;
  var avgRate=state.habits.length?Math.round(state.habits.reduce(function(s,h){return s+ratePct(h);},0)/state.habits.length):0;

  var statHTML=
    statCard("Best streak",best," days","var(--flame)","flame")+
    statCard("30-day rate",avgRate,"%","#16B981","trending-up")+
    statCard("Active habits",state.habits.length,"","#3B82F6","list-checks")+
    statCard("Done today",todayDone,"/"+todaySched.length,"#8B5CF6","check");

  var barsHTML=bars.map(function(b){
    var hh=b.pct>0?Math.max(8,(b.pct/100)*108):4;
    var bg=b.pct>0?"linear-gradient(var(--ringA),var(--ringB))":"var(--track)";
    return '<div class="barcol"><div class="bar" title="'+b.pct+'%" data-h="'+hh+'" style="height:0;background:'+bg+';"></div><div class="barday">'+b.day+'</div></div>';
  }).join("");
  var chart='<div class="card anim-in" style="animation-delay:100ms;padding:18px 16px 14px;">'+
    '<div style="font-size:14px;font-weight:700;margin-bottom:4px;">Last 7 days</div>'+
    '<div class="hsub" style="margin-bottom:14px;">Average completion across scheduled habits</div>'+
    '<div class="bars">'+barsHTML+'</div></div>';

  var perHabit=state.habits.map(function(h,i){
    var g=goalOf(h);
    return '<div class="card anim-in" style="animation-delay:'+(140+i*60)+'ms;padding:16px;">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'+
      '<span class="dot"></span>'+
      '<div style="flex:1;min-width:0;"><div class="hname" style="font-weight:700;font-size:14.5px;">'+esc(h.name)+(isCount(h)?'<span style="color:var(--sub);font-weight:600;">  ·  '+g+' '+unitLabel(g,h.unit)+' / day</span>':'')+'</div></div>'+
      '<div style="display:flex;gap:16px;flex-shrink:0;">'+
        '<div class="mini"><div class="miniv display" style="color:var(--flame);">'+currentStreak(h,todayKey)+'</div><div class="minil">now</div></div>'+
        '<div class="mini"><div class="miniv display">'+bestStreak(h)+'</div><div class="minil">best</div></div>'+
      '</div></div><div class="scroll-x">'+heatmapHTML(h)+'</div></div>';
  }).join("");

  var emptyTail=state.habits.length===0?emptyHTML("trending-up","No data yet","Add habits to see streaks and trends here."):"";
  return '<div class="screen"><h1 class="title display anim-in">Progress</h1>'+
    '<div class="statgrid anim-in" style="animation-delay:50ms;">'+statHTML+'</div>'+chart+perHabit+emptyTail+'</div>';
}
function statCard(label,value,suffix,accent,icon){
  return '<div class="card" style="padding:15px;">'+
    '<div style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:'+(accent.indexOf("var")===0?"rgba(245,134,11,.13)":hexA(accent,0.13))+';margin-bottom:10px;">'+ic(icon,16,accent)+'</div>'+
    '<div class="statval display" data-count="'+value+'" data-suffix="'+suffix+'">0<span class="statsuf">'+suffix+'</span></div>'+
    '<div class="statlbl">'+label+'</div></div>';
}
function heatmapHTML(h){
  var weeks=15,today=new Date(),startCol=startOfWeek(addDays(today,-(weeks-1)*7)),cols="";
  for(var w=0;w<weeks;w++){
    var cells="";
    for(var day=0;day<7;day++){
      var d=addDays(startCol,w*7+day),k=fmtKey(d),future=d>today;
      var sched=!future && isScheduled(h,k), f=sched?frac(h,k):0;
      var bg=future?"transparent":sched?(f>0?hexA(ACCENT,0.4+0.6*f):hexA(ACCENT,0.12)):"var(--track)";
      cells+='<div class="heatcell" title="'+k+(f>=1?" · done":f>0?" · "+Math.round(f*100)+"%":"")+'" style="background:'+bg+';"></div>';
    }
    cols+='<div class="heatcol">'+cells+'</div>';
  }
  return '<div class="heat">'+cols+'</div>';
}
function emptyHTML(icon,title,text){
  return '<div class="empty anim-in"><div class="emptyicon">'+ic(icon,24,"#B9B7BE")+'</div><div class="emptytitle">'+title+'</div><div class="emptytext">'+text+'</div></div>';
}

/* --------------------------- post-render anims -------------------------- */
function postRender(){
  var ring=document.querySelector(".ringfg");
  if(ring){ var off=ring.getAttribute("data-off"); if(reduced()){ring.style.transition="none";ring.setAttribute("stroke-dashoffset",off);} else { requestAnimationFrame(function(){requestAnimationFrame(function(){ring.setAttribute("stroke-dashoffset",off);});}); } }
  document.querySelectorAll(".bar").forEach(function(b){ var hh=b.getAttribute("data-h"); if(reduced()){b.style.height=hh+"px";} else { requestAnimationFrame(function(){requestAnimationFrame(function(){b.style.height=hh+"px";});}); } });
  document.querySelectorAll("[data-count]").forEach(function(el){
    var target=parseInt(el.getAttribute("data-count"),10)||0;
    var pct=el.getAttribute("data-pct"), suffix=el.getAttribute("data-suffix")||"";
    function out(v){ if(pct) return v+"%"; if(el.classList.contains("statval")) return v+'<span class="statsuf">'+suffix+'</span>'; return v+suffix; }
    if(reduced()){ el.innerHTML=out(target); return; }
    var dur=850,s=null;
    function step(t){ if(!s)s=t; var p=Math.min(1,(t-s)/dur); el.innerHTML=out(Math.round(target*easeOut(p))); if(p<1)requestAnimationFrame(step); }
    requestAnimationFrame(step);
  });
}

/* ============================== interactions ============================= */
document.addEventListener("click",function(e){
  var t=e.target.closest("[data-tab],[data-toggle],[data-quick],[data-inc],[data-dec],[data-datenav],[data-add],[data-edit],[data-del],[data-tdone],[data-tx]");
  if(!t)return;
  if(t.hasAttribute("data-tdone")){
    var uid=t.getAttribute("data-tdone"), tt=state.toasts.filter(function(x){return x.uid===uid;})[0];
    if(tt){ state.reminded[tt.habitId+":"+tt.date]=true; state.toasts=state.toasts.filter(function(x){return x.uid!==uid;}); setVal(tt.habitId, tt.date, goalOf(findHabit(tt.habitId))); }
    return;
  }
  if(t.hasAttribute("data-tx")){
    var ux=t.getAttribute("data-tx"), tx=state.toasts.filter(function(x){return x.uid===ux;})[0];
    if(tx)state.reminded[tx.habitId+":"+tx.date]=true;
    state.toasts=state.toasts.filter(function(x){return x.uid!==ux;}); save(); renderToasts();
    return;
  }
  if(t.hasAttribute("data-tab")){ state.tab=t.getAttribute("data-tab"); render(); }
  else if(t.hasAttribute("data-toggle")||t.hasAttribute("data-quick")){
    var id=t.getAttribute("data-toggle")||t.getAttribute("data-quick");
    var h=findHabit(id),g=goalOf(h),done=prog(h,state.selDate);
    setVal(id,state.selDate, done>=g?0:g);
  }
  else if(t.hasAttribute("data-inc")){ var iid=t.getAttribute("data-inc"); setVal(iid,state.selDate, prog(findHabit(iid),state.selDate)+1); }
  else if(t.hasAttribute("data-dec")){ var did=t.getAttribute("data-dec"); setVal(did,state.selDate, prog(findHabit(did),state.selDate)-1); }
  else if(t.hasAttribute("data-datenav")){
    var dir=parseInt(t.getAttribute("data-datenav"),10);
    var next=fmtKey(addDays(parseKey(state.selDate),dir));
    if(dir>0 && next>fmtKey(new Date()))return;
    state.selDate=next; render();
  }
  else if(t.hasAttribute("data-add")){ openSheet(null); }
  else if(t.hasAttribute("data-edit")){ openSheet(findHabit(t.getAttribute("data-edit"))); }
  else if(t.hasAttribute("data-del")){ delHabit(t.getAttribute("data-del")); }
});
function findHabit(id){ return state.habits.filter(function(h){return h.id===id;})[0]; }
function setVal(id,key,value){
  var h=findHabit(id); if(!h)return; var g=goalOf(h);
  var v=Math.max(0,Math.min(g,value));
  var m=state.completions[id]||(state.completions[id]={});
  if(v<=0)delete m[key]; else m[key]=v;
  state.toasts=state.toasts.filter(function(t){return !(t.habitId===id && isFull(findHabit(t.habitId),t.date));});
  save(); render();
}
function showConfirm(title,text,onYes){
  var back=document.createElement("div");
  back.className="backdrop"; back.style.alignItems="center"; back.style.padding="20px";
  back.innerHTML='<div class="confirmbox"><div class="confirmtitle">'+esc(title)+'</div><div class="confirmtext">'+esc(text)+'</div>'+
    '<div class="confirmrow"><button class="btn-ghost" id="cno">Cancel</button><button class="btn-danger" id="cyes">Delete</button></div></div>';
  document.body.appendChild(back);
  function close(){ window.removeEventListener("keydown",onK); back.remove(); }
  function onK(e){ if(e.key==="Escape")close(); }
  window.addEventListener("keydown",onK);
  back.addEventListener("click",function(e){ if(e.target===back)close(); });
  back.querySelector("#cno").addEventListener("click",close);
  back.querySelector("#cyes").addEventListener("click",function(){ close(); onYes(); });
}
function delHabit(id){
  var h=findHabit(id); if(!h)return;
  showConfirm("Delete habit","Delete “"+h.name+"” and all of its history? This can’t be undone.",function(){
    state.habits=state.habits.filter(function(x){return x.id!==id;});
    delete state.completions[id];
    state.toasts=state.toasts.filter(function(t){return t.habitId!==id;});
    save(); render();
  });
}

/* ============================ add / edit sheet =========================== */
function openSheet(initial){
  var s={
    name: initial?initial.name:"",
    type: initial?habitType(initial):"binary",
    target: initial&&isCount(initial)?goalOf(initial):10,
    unit: initial&&initial.unit?initial.unit:"times",
    freq: initial?initial.freq:"daily",
    days: initial&&initial.days&&initial.days.length?initial.days.slice():[1,2,3,4,5],
    startDate: initial?initial.startDate:fmtKey(new Date()),
    hasEnd: !!(initial&&initial.endDate),
    endDate: initial&&initial.endDate?initial.endDate:fmtKey(addDays(new Date(),30)),
    remind: initial&&initial.remind?{on:!!initial.remind.on,from:initial.remind.from||"18:00",to:initial.remind.to||"21:00"}:{on:false,from:"18:00",to:"21:00"}
  };
  var back=document.createElement("div");
  back.className="backdrop";
  back.innerHTML=
    '<div class="sheet">'+
      '<div class="sheethead"><h2 class="sheettitle display">'+(initial?"Edit habit":"New habit")+'</h2>'+
      '<button class="iconbtn" id="sx">'+ic("x",18,"#8C8A93")+'</button></div>'+
      '<label class="lbl">Name</label>'+
      '<input class="field" id="sname" placeholder="e.g. Drink water" value="'+esc(s.name)+'">'+
      '<label class="lbl">Type</label>'+
      '<div class="seg" id="stype" style="margin-bottom:8px;"><button data-type="binary">Yes / no</button><button data-type="count">Measurable</button></div>'+
      '<div class="goalhelp" id="binhelp">One tap marks the day done — best for things like “Meditate” or “No sugar”.</div>'+
      '<div id="countwrap">'+
        '<label class="lbl">Daily target</label>'+
        '<div style="display:flex;gap:10px;margin-bottom:12px;">'+
          '<input type="number" min="1" inputmode="numeric" class="field" id="tinput" style="margin-bottom:0;width:92px;text-align:center;">'+
          '<input type="text" class="field" id="uinput" placeholder="unit — e.g. pages, minutes" maxlength="16" style="margin-bottom:0;flex:1;">'+
        '</div>'+
        '<div class="chips" id="uchips">'+UNIT_PRESETS.map(function(u){return '<button class="chip" data-unit="'+u+'">'+u+'</button>';}).join("")+'</div>'+
        '<div class="goalhelp" id="ghelp"></div>'+
      '</div>'+
      '<label class="lbl">Repeat</label>'+
      '<div class="seg" id="sseg" style="margin-bottom:12px;"><button data-freq="daily">Every day</button><button data-freq="weekly">Specific days</button></div>'+
      '<div class="days" id="sdays">'+WEEK.map(function(w,i){return '<button class="day" data-day="'+i+'">'+w+'</button>';}).join("")+'</div>'+
      '<div class="daterow">'+
        '<div class="datecol"><label class="lbl">Starts</label><input type="date" class="field" id="sstart" style="margin-bottom:0;" value="'+s.startDate+'"></div>'+
        '<div class="datecol"><label class="lbl" style="display:flex;justify-content:space-between;align-items:center;">Ends <button class="endtoggle" id="setog"></button></label>'+
        '<input type="date" class="field" id="send" style="margin-bottom:0;" min="'+s.startDate+'" value="'+s.endDate+'"></div>'+
      '</div>'+
      '<label class="lbl" style="display:flex;justify-content:space-between;align-items:center;">Reminder <button class="endtoggle" id="rtog"></button></label>'+
      '<div id="remwrap">'+
        '<div class="timerow">'+
          '<div class="datecol"><div class="hsub" style="margin-bottom:6px;">From</div><input type="time" class="field" id="rfrom" style="margin-bottom:0;"></div>'+
          '<div class="datecol"><div class="hsub" style="margin-bottom:6px;">To</div><input type="time" class="field" id="rto" style="margin-bottom:0;"></div>'+
        '</div>'+
        '<div class="goalhelp" id="remhelp"></div>'+
      '</div>'+
      '<div class="err" id="serr" style="display:none;"></div>'+
      '<button class="primary" id="ssave">'+(initial?"Save changes":"Create habit")+'</button>'+
    '</div>';
  document.body.appendChild(back);
  if(window.lucide)lucide.createIcons();

  back.addEventListener("click",function(e){ if(e.target===back)close(); });
  back.querySelector("#sx").addEventListener("click",close);
  function onKey(e){ if(e.key==="Escape")close(); }
  window.addEventListener("keydown",onKey);
  function close(){ window.removeEventListener("keydown",onKey); back.remove(); }

  var nameEl=back.querySelector("#sname"), errEl=back.querySelector("#serr");

  function helpText(){
    var n=parseInt(s.target,10)||1;
    return "Log up to "+n+" "+unitLabel(n,s.unit)+" a day. The day completes your streak once you reach "+n+".";
  }

  function refresh(){
    back.querySelectorAll("#stype button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-type")===s.type); });
    back.querySelector("#stype").style.marginBottom=s.type==="count"?"14px":"8px";
    back.querySelector("#binhelp").style.display=s.type==="binary"?"block":"none";
    back.querySelector("#countwrap").style.display=s.type==="count"?"block":"none";
    if(s.type==="count"){
      back.querySelector("#tinput").value=s.target;
      back.querySelector("#uinput").value=s.unit;
      back.querySelector("#ghelp").textContent=helpText();
      back.querySelectorAll("#uchips .chip").forEach(function(b){ b.classList.toggle("chipon", b.getAttribute("data-unit")===s.unit); });
    }
    back.querySelectorAll("#sseg button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-freq")===s.freq); });
    back.querySelector("#sdays").style.display=s.freq==="weekly"?"flex":"none";
    back.querySelectorAll("#sdays .day").forEach(function(b){
      var on=s.days.indexOf(parseInt(b.getAttribute("data-day"),10))>=0;
      b.style.background=on?ACCENT:"var(--bg)"; b.style.color=on?"#fff":"var(--sub)"; b.style.border=on?"none":"1px solid var(--line)";
    });
    back.querySelector("#setog").textContent=s.hasEnd?"on":"off";
    back.querySelector("#setog").style.color=s.hasEnd?ACCENT:"var(--faint)";
    var endEl=back.querySelector("#send"); endEl.disabled=!s.hasEnd; endEl.style.opacity=s.hasEnd?1:0.4;
    back.querySelector("#rtog").textContent=s.remind.on?"on":"off";
    back.querySelector("#rtog").style.color=s.remind.on?ACCENT:"var(--faint)";
    back.querySelector("#remwrap").style.display=s.remind.on?"block":"none";
    back.querySelector("#rfrom").value=s.remind.from;
    back.querySelector("#rto").value=s.remind.to;
    back.querySelector("#remhelp").textContent="If it’s still unfinished after "+fmtTime(s.remind.to)+", a reminder pops up inside the app.";
  }

  nameEl.addEventListener("input",function(){ s.name=nameEl.value; errEl.style.display="none"; });
  back.querySelector("#stype").addEventListener("click",function(e){ var b=e.target.closest("[data-type]"); if(!b)return; s.type=b.getAttribute("data-type"); errEl.style.display="none"; refresh(); });
  back.querySelector("#tinput").addEventListener("input",function(e){ s.target=e.target.value; errEl.style.display="none"; back.querySelector("#ghelp").textContent=helpText(); });
  back.querySelector("#uchips").addEventListener("click",function(e){
    var b=e.target.closest("[data-unit]"); if(!b)return;
    s.unit=b.getAttribute("data-unit"); refresh();
  });
  back.querySelector("#uinput").addEventListener("input",function(e){
    s.unit=e.target.value;
    back.querySelector("#ghelp").textContent=helpText();
    back.querySelectorAll("#uchips .chip").forEach(function(b){ b.classList.toggle("chipon", b.getAttribute("data-unit")===s.unit); });
  });
  back.querySelector("#sseg").addEventListener("click",function(e){ var b=e.target.closest("[data-freq]"); if(!b)return; s.freq=b.getAttribute("data-freq"); refresh(); });
  back.querySelector("#sdays").addEventListener("click",function(e){
    var b=e.target.closest("[data-day]"); if(!b)return;
    var d=parseInt(b.getAttribute("data-day"),10), idx=s.days.indexOf(d);
    if(idx>=0)s.days.splice(idx,1); else { s.days.push(d); s.days.sort(); }
    errEl.style.display="none"; refresh();
  });
  back.querySelector("#sstart").addEventListener("change",function(e){ s.startDate=e.target.value; back.querySelector("#send").min=s.startDate; });
  back.querySelector("#send").addEventListener("change",function(e){ s.endDate=e.target.value; });
  back.querySelector("#setog").addEventListener("click",function(){ s.hasEnd=!s.hasEnd; refresh(); });
  back.querySelector("#rtog").addEventListener("click",function(){ s.remind.on=!s.remind.on; errEl.style.display="none"; refresh(); });
  back.querySelector("#rfrom").addEventListener("change",function(e){ s.remind.from=e.target.value; refresh(); });
  back.querySelector("#rto").addEventListener("change",function(e){ s.remind.to=e.target.value; refresh(); });
  back.querySelector("#ssave").addEventListener("click",function(){
    var name=nameEl.value.trim();
    if(!name)return showErr("Give your habit a name.");
    if(s.type==="count" && (!s.target || Number(s.target)<1))return showErr("Set a target of at least 1.");
    if(s.freq==="weekly" && s.days.length===0)return showErr("Pick at least one day.");
    if(s.hasEnd && s.endDate<s.startDate)return showErr("End date can’t be before the start date.");
    if(s.remind.on && toMin(s.remind.to)<=toMin(s.remind.from))return showErr("Reminder end time must be after the start time.");
    var habit={ id: initial?initial.id:"h"+Date.now(), name:name, type:s.type,
      goal: s.type==="count"?Math.max(1,Math.min(1000,Math.round(Number(s.target)||1))):1,
      unit: s.type==="count"?(s.unit.trim()||"times"):"times",
      freq:s.freq, days: s.freq==="weekly"?s.days.slice():[], startDate:s.startDate, endDate: s.hasEnd?s.endDate:null,
      remind: {on:s.remind.on, from:s.remind.from, to:s.remind.to} };
    if(initial){ for(var i=0;i<state.habits.length;i++){ if(state.habits[i].id===habit.id){ state.habits[i]=habit; break; } } }
    else { state.habits.push(habit); if(!state.completions[habit.id])state.completions[habit.id]={}; }
    save(); close(); render();
  });
  function showErr(m){ errEl.textContent=m; errEl.style.display="block"; }

  refresh();
  setTimeout(function(){ nameEl.focus(); },50);
}

/* =========================== drag to reorder ============================ */
var dragv=null;
document.addEventListener("pointerdown",function(e){
  var grip=e.target.closest("[data-grip]");
  if(!grip || state.tab!=="habits")return;
  e.preventDefault();
  var list=document.getElementById("habitlist"); if(!list)return;
  var rows=Array.prototype.slice.call(list.querySelectorAll(".row"));
  var rects=rows.map(function(el){return el.getBoundingClientRect();});
  var row=grip.closest(".row");
  var orig=rows.indexOf(row);
  dragv={ rows:rows, centers:rects.map(function(r){return r.top+r.height/2;}),
    orig:orig, target:orig, step:rects[orig].height+10, startY:e.clientY };
  row.style.transition="none"; row.style.zIndex="5"; row.style.position="relative";
  row.style.boxShadow="0 12px 26px rgba(0,0,0,.15)";
  document.body.style.userSelect="none";
  window.addEventListener("pointermove",dragMove,{passive:false});
  window.addEventListener("pointerup",dragUp);
});
function dragMove(e){
  if(!dragv)return; e.preventDefault();
  var dy=e.clientY-dragv.startY;
  var center=dragv.centers[dragv.orig]+dy;
  var target=dragv.orig;
  for(var i=0;i<dragv.centers.length;i++){
    if(i<dragv.orig && center<dragv.centers[i]) target=Math.min(target,i);
    if(i>dragv.orig && center>dragv.centers[i]) target=Math.max(target,i);
  }
  dragv.target=target;
  dragv.rows.forEach(function(el,i){
    if(i===dragv.orig){ el.style.transform="translateY("+dy+"px) scale(1.02)"; return; }
    var tx=0;
    if(dragv.orig<target && i>dragv.orig && i<=target) tx=-dragv.step;
    else if(target<dragv.orig && i>=target && i<dragv.orig) tx=dragv.step;
    el.style.transition="transform .18s ease";
    el.style.transform = tx?("translateY("+tx+"px)"):"";
  });
}
function dragUp(){
  window.removeEventListener("pointermove",dragMove);
  window.removeEventListener("pointerup",dragUp);
  document.body.style.userSelect="";
  if(dragv){
    var o=dragv.orig,t=dragv.target;
    if(t!==o){
      var arr=state.habits.slice();
      var m=arr.splice(o,1)[0];
      arr.splice(t,0,m);
      state.habits=arr; save();
    }
    dragv=null; render();
  }
}

/* ================================= init ================================== */
(function init(){
  var data=load();
  var today=fmtKey(new Date());
  if(data){
    state.habits=data.habits.map(function(h){ h.goal=Math.max(1,h.goal||1); h.unit=h.unit||"times"; h.type=h.type||(h.goal>1?"count":"binary"); h.remind=h.remind||{on:false,from:"18:00",to:"21:00"}; return h; });
    state.completions=data.completions||{};
    var rem=data.reminded||{}; state.reminded={};
    Object.keys(rem).forEach(function(k){ if(k.indexOf(":"+today)>=0)state.reminded[k]=true; }); // keep only today
  } else { var s=seed(); state.habits=s.habits; state.completions=s.completions; save(); }
  render();
  checkReminders();
  setInterval(checkReminders, 30000);
})();
</script>
